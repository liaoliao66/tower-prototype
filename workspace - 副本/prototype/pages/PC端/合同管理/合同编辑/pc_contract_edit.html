<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>对上合同编辑 - 通信铁塔检测系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
<style>.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:16px}.tab{padding:10px 16px;font-size:13px;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent}.tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}</style>
</head>
<body>
<div id="page-content">
  <div class="page-header">
    <div class="page-title">对上合同 · 新建/编辑</div>
    <a href="../合同列表/pc_contract_list.html" class="btn btn-default"><i class="fa-solid fa-arrow-left"></i> 返回对上合同</a>
  </div>
  <div class="tab-bar">
    <div class="tab on">主档</div>
    <div class="tab">单价明细</div>
    <div class="tab">收付款提醒</div>
    <div class="tab">合同收付款</div>
  </div>
  <div class="card" style="margin-bottom:16px">
    <div class="card-header"><div class="card-title">基本信息</div></div>
    <div class="card-body">
      <div class="form-grid form-grid-3">
        <div class="form-group full">
          <label class="form-label">合同名称 <span class="required">*</span></label>
          <input type="text" class="form-input" style="width:100%" placeholder="请输入合同名称">
        </div>
        <div class="form-group">
          <label class="form-label">所属客户 <span class="required">*</span></label>
          <select class="form-select" style="width:100%"><option>请选择客户</option><option>中国移动浙江公司</option><option>浙江某建设集团</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">合同类型 <span class="required">*</span></label>
          <select class="form-select" style="width:100%" id="ctype"><option>自有</option><option>分包</option></select>
        </div>
        <div class="form-group" id="fbwrap" style="display:none">
          <label class="form-label">分包比例 <span class="required">*</span></label>
          <input type="number" class="form-input" style="width:100%" placeholder="%" step="0.1">
        </div>
        <div class="form-group">
          <label class="form-label">合同金额(含税) <span class="required">*</span></label>
          <input type="text" class="form-input" style="width:100%" placeholder="元">
        </div>
        <div class="form-group">
          <label class="form-label">合同金额(不含税)</label>
          <input type="text" class="form-input" style="width:100%;background:#F7F8FA" readonly placeholder="自动计算">
        </div>
        <div class="form-group">
          <label class="form-label">合同起始 <span class="required">*</span></label>
          <input type="date" class="form-input" style="width:100%">
        </div>
        <div class="form-group">
          <label class="form-label">合同截止 <span class="required">*</span></label>
          <input type="date" class="form-input" style="width:100%">
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">单价模块</div></div>
    <div class="card-body">
      <table class="data-table">
        <thead><tr><th>名称</th><th>含税单价</th><th>不含税单价</th><th>数量</th><th>含税合计</th><th>不含税合计</th><th style="width:80px">操作</th></tr></thead>
        <tbody>
          <tr><td>单站安全性鉴定</td><td>8,500</td><td>7,547</td><td>1</td><td>8,500</td><td>7,547</td><td><button class="btn-text">删除</button></td></tr>
        </tbody>
      </table>
      <button type="button" class="btn btn-default" style="margin-top:10px"><i class="fa-solid fa-plus"></i> 添加行</button>
    </div>
  </div>
  <div class="form-footer" style="margin-top:16px">
    <a href="../合同列表/pc_contract_list.html" class="btn btn-default">取消</a>
    <button type="button" class="btn btn-primary"><i class="fa-solid fa-check"></i> 保存</button>
  </div>
</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>
window.__layoutConfig = { active: 'contract_list', breadcrumb: ['合同管理', '对上合同', '合同编辑'] };
document.getElementById('ctype').addEventListener('change', function() {
  document.getElementById('fbwrap').style.display = this.value === '分包' ? 'block' : 'none';
});
</script>
</body>
</html>
