<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检测单位 - 通信铁塔检测系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
</head>
<body>
<div id="page-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">检测单位</div>
    </div>
    <div class="card-body">
      <p style="font-size:12px;color:var(--text-3);margin:0 0 12px">主档含基础信息；<strong>检测组</strong>与<strong>人员</strong>在维护页以左右结构录入（左侧组名、右侧组内人员及唯一负责人）。</p>
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" class="form-input" placeholder="检测单位名称/编码">
          <button type="button" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> 查询</button>
          <button type="button" class="btn btn-default">重置</button>
        </div>
        <div class="toolbar-right">
          <button type="button" class="btn btn-primary" onclick="location.href='pc_data_inspection_unit_create.html'"><i class="fa-solid fa-plus"></i> 新增检测单位</button>
        </div>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>检测单位名称</th>
            <th>检测单位编码</th>
            <th>所在地址</th>
            <th>公司负责人</th>
            <th>联系方式</th>
            <th class="col-action">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>浙江中能工程检测有限公司</td>
            <td>ORG-ZN-001</td>
            <td>浙江省杭州市滨江区江南大道588号</td>
            <td>张某某</td>
            <td>0571-88888888</td>
            <td class="col-action">
              <button type="button" class="btn btn-text" onclick="location.href='pc_data_inspection_unit_create.html'">编辑</button>
              <button type="button" class="btn btn-text">查看架构</button>
            </td>
          </tr>
          <tr>
            <td>杭州华测结构检测中心</td>
            <td>ORG-HC-002</td>
            <td>浙江省杭州市西湖区文三路259号</td>
            <td>李某某</td>
            <td>13900001111</td>
            <td class="col-action">
              <button type="button" class="btn btn-text" onclick="location.href='pc_data_inspection_unit_create.html'">编辑</button>
              <button type="button" class="btn btn-text">查看架构</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="pagination">
        <span>共 2 条记录</span>
        <div class="pagination-btns">
          <button type="button" class="page-btn active">1</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>window.__layoutConfig = { active: 'data_inspection_unit', breadcrumb: ['基础数据', '检测单位'] };</script>
</body>
</html>
