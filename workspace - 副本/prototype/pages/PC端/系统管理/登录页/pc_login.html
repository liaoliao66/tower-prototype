<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: { brand: { DEFAULT: '#0f172a', accent: '#059669' } }
    }
  }
};
</script>
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
</style>
</head>
<body class="pc-body">
<div class="min-h-screen flex items-center justify-center bg-slate-100 relative overflow-hidden">
<img src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80" alt="" class="absolute inset-0 w-full h-full object-cover opacity-40">
<div class="relative z-10 w-full max-w-md mx-4">
  <div class="bg-white/95 backdrop-blur rounded-2xl shadow-[0_8px_24px_rgba(0,0,0,0.08)] p-8 border border-slate-200/80">
    <div class="text-center mb-6">
      <img src="https://images.unsplash.com/photo-1545558014-8692077e9d5c?auto=format&fit=crop&w=1200&q=80" alt="" class="w-[120px] h-auto mx-auto rounded-xl mb-4 object-cover">
      <h1 class="text-xl font-semibold text-slate-900">通信铁塔检测系统</h1>
      <p class="text-sm text-slate-500 mt-1">浙江中能工程检测有限公司</p>
    </div>

    <form class="space-y-4" id="loginForm">
      <div>
        <label class="text-xs text-slate-500" for="loginAccount">账号</label>
        <input id="loginAccount" name="u" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm" placeholder="请输入账号" maxlength="50" autocomplete="username">
      </div>
      <div>
        <label class="text-xs text-slate-500" for="loginPassword">密码</label>
        <input id="loginPassword" type="password" class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2.5 text-sm" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <div class="flex gap-2">
        <input class="w-28 rounded-xl border border-slate-200 px-3 py-2 text-sm" placeholder="验证码" maxlength="4" aria-label="验证码">
        <img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=1200&q=80" alt="验证码" class="h-10 w-28 object-cover rounded-lg cursor-pointer border border-slate-200" title="点击刷新">
      </div>
      <label class="flex items-center gap-2 text-sm text-slate-600"><input type="checkbox"> 记住密码</label>
      <button type="submit" class="w-full py-3 rounded-xl bg-brand text-white font-medium hover:opacity-95 transition btn-tap">登录</button>
    </form>

    <p class="text-center mt-4 text-sm text-slate-500"><a href="#" class="hover:text-slate-800">忘记密码</a></p>
  </div>
</div>
</div>

<script>
(function () {
  function inferRoleFromAccount(account) {
    var s = (account || '').trim();
    var lower = s.toLowerCase();
    if (!s) return 'contract';
    if (lower.indexOf('ht_') === 0 || /合同|hetong|order/i.test(s)) return 'contract';
    if (lower.indexOf('xc_') === 0 || /现场|检测|survey|field/i.test(s)) return 'field';
    if (lower.indexOf('bg_') === 0 || /报告|编制|shenhe|audit/i.test(s)) return 'report';
    if (lower.indexOf('zj_') === 0 || /专家|审阅|readonly|guest/i.test(s) || lower === 'admin') return 'expert';
    return 'contract';
  }

  var acc = document.getElementById('loginAccount');
  var form = document.getElementById('loginForm');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var r = inferRoleFromAccount(acc.value);
    location.href = '../../铁塔检测业务/检测任务/pc_task_list.html?role=' + encodeURIComponent(r);
  });
})();
</script>
</body>
</html>
