<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告审核</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
<style>
  .readonly-field { background:#F7F8FA; border:1px solid var(--border); border-radius:4px; padding:6px 12px; font-size:13px; color:var(--text-2); min-height:32px; display:flex; align-items:center; }
  .readonly-textarea { background:#F7F8FA; border:1px solid var(--border); border-radius:4px; padding:8px 12px; font-size:13px; color:var(--text-2); min-height:80px; line-height:1.6; }
  .radio-group { display:flex; gap:20px; align-items:center; }
  .radio-group label { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-2); cursor:pointer; }
</style>
</head>
<body>
<div id="page-content">

  <!-- 报告内容 -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header"><div class="card-title">报告内容</div></div>
    <div class="card-body">
      <div class="form-grid form-grid-3">
        <div class="form-group">
          <label class="form-label">报告编号</label>
          <div class="readonly-field">BG202605003</div>
        </div>
        <div class="form-group">
          <label class="form-label">编制</label>
          <div class="readonly-field">张华</div>
        </div>
        <div class="form-group">
          <label class="form-label">编制时间</label>
          <div class="readonly-field">2026-05-06</div>
        </div>
        <div class="form-group">
          <label class="form-label">委托单位</label>
          <div class="readonly-field">杭州移动通信有限公司</div>
        </div>
        <div class="form-group">
          <label class="form-label">铁塔名称</label>
          <div class="readonly-field">滨江01#单管</div>
        </div>
        <div class="form-group">
          <label class="form-label">检测类</label>
          <div class="readonly-field">安全性鉴</div>
        </div>
      </div>
      <div style="margin-top:16px;">
        <div class="form-group">
          <label class="form-label">检测结果/label>
          <div class="readonly-field" style="color:var(--danger);font-weight:500;">不合</div>
        </div>
      </div>
      <div style="margin-top:16px;">
        <div class="form-group">
          <label class="form-label">检测结果描述</label>
          <div class="readonly-textarea">经检测，滨江01#单管塔共5段，其中第4段发现2颗M24高强螺栓松动，第3段法兰间隙为1.2mm（标准要求≤1.0mm），其余各段检测指标均在正常范围内。塔身整体倾斜率为0.12%，满足规范要求（≤0.2%）。</div>
        </div>
      </div>
      <div style="margin-top:16px;">
        <div class="form-group">
          <label class="form-label">处理建议</label>
          <div class="readonly-textarea">1. 第4段松动螺栓需立即进行紧固处理。<br>2. 第3段法兰间隙偏大，建议增加垫片调整。<br>3. 建议6个月后进行复检</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 审核意见 -->
  <div class="card">
    <div class="card-header"><div class="card-title">审核意见</div></div>
    <div class="card-body">
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label">审核意见 <span class="required">*</span></label>
        <textarea class="form-textarea" placeholder="请输入审核意见""""></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">审核结果 <span class="required">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="audit_result" checked> 通过</label>
          <label><input type="radio" name="audit_result"> 驳回</label>
        </div>
      </div>

      <div class="form-footer">
        <button class="btn btn-default">返回</button>
        <a href="pc_report_audit_transfer.html" class="btn btn-default">转办</a>
        <button class="btn btn-danger">驳回</button>
        <button class="btn btn-primary">通过</button>
      </div>
    </div>
  </div>

</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>window.__layoutConfig = {active:'report_audit', breadcrumb:['检测管理','报告审核']};</script>
</body>
</html>
