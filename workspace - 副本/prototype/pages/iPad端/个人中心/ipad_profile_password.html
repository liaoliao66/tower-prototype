<!DOCTYPE html>
<html lang="zh-CN" class="ipad-profile-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>修改密码</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../assets/ipad-embed.css">
<link rel="stylesheet" href="../../../assets/ipad-profile-shell.css">
<script src="../../../assets/ipad-adapt.js" defer></script>
</head>
<body class="ipad-adapt ipad-profile-page">
<div class="page-status" aria-hidden="true"><span>9:41</span><span class="icons"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span></div>
<div class="page-nav">
  <a class="nav-back" href="首页/ipad_profile_index.html"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <h1 class="nav-title">修改密码</h1>
  <span class="nav-spacer" aria-hidden="true"></span>
</div>
<main class="sub-scroll"><div class="sub-inner">
<div class="form-sec">
  <div class="form-fld"><label for="pwdOld">当前密码</label><input id="pwdOld" type="password" autocomplete="current-password" placeholder="请输入当前密码"></div>
  <div class="form-fld"><label for="pwdNew">新密码</label><input id="pwdNew" type="password" autocomplete="new-password" placeholder="8～20 位，含字母与数字"></div>
  <div class="form-fld"><label for="pwdConfirm">确认新密码</label><input id="pwdConfirm" type="password" autocomplete="new-password" placeholder="再次输入新密码"></div>
</div>
</div></main>
<div class="profile-footer">
  <button type="button" class="btn-ghost" onclick="history.back()">取消</button>
  <button type="button" class="btn-primary" id="btnSavePwd">保存</button>
</div>
<script>document.getElementById('btnSavePwd').addEventListener('click',function(){alert('密码已更新（原型演示）');});</script>
</body></html>
