<!DOCTYPE html>
<!-- iPad-INSPECT_FEED v2.1 landscape -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>馈线检测</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/app-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-basic.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
</head>
<body class="inspect-app-layout ipad-adapt">
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div id="appNavBar">
  <a href="../../任务/填报主页/ipad_task_inspect_home.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">馈线检测</span>
  <span style="width:40px;"></span>
</div>

<div id="appEmbedContent" class="inspect-form-stack">

  <section class="basic-card" aria-labelledby="feedDataTitle">
    <h3 id="feedDataTitle" class="basic-card-title">馈线检测数据</h3>

    <div class="basic-grid-2">
      <div class="basic-field">
        <label class="basic-label" for="feedDoor"><i class="fa-solid fa-door-open" aria-hidden="true"></i>馈线门</label>
        <select id="feedDoor" class="form-input">
          <option selected>有</option>
          <option>无</option>
        </select>
      </div>
      <div class="basic-field">
        <label class="basic-label" for="feedHoleQty"><i class="fa-solid fa-circle-dot" aria-hidden="true"></i>馈线孔数量</label>
        <input id="feedHoleQty" type="number" class="form-input" value="4" placeholder="请输入馈线孔数量">
      </div>
    </div>

    <div class="basic-grid-2">
      <div class="basic-field">
        <label class="basic-label" for="feedDiameter"><i class="fa-solid fa-ruler-horizontal" aria-hidden="true"></i>馈线直径（mm）</label>
        <input id="feedDiameter" type="number" class="form-input" value="50" placeholder="请输入馈线直径">
      </div>
      <div class="basic-field">
        <label class="basic-label" for="feedQty"><i class="fa-solid fa-ethernet" aria-hidden="true"></i>馈线数量</label>
        <input id="feedQty" type="number" class="form-input" value="6" placeholder="请输入馈线数量">
      </div>
    </div>

    <div class="basic-field">
      <label class="basic-label" for="feedWindowW"><i class="fa-solid fa-ruler" aria-hidden="true"></i>馈线窗宽度（mm）</label>
      <input id="feedWindowW" type="number" class="form-input" value="300" placeholder="请输入馈线窗宽度">
    </div>

    <div class="basic-field">
      <label class="basic-label"><i class="fa-solid fa-circle-check" aria-hidden="true"></i>检测结果</label>
      <div class="toggle-pair" id="feedResultToggle" data-val="1">
        <button type="button" class="toggle-opt on-pass" data-val="1">合格</button>
        <button type="button" class="toggle-opt" data-val="0">不合格</button>
      </div>
    </div>

    <div class="basic-field">
      <label class="basic-label"><i class="fa-solid fa-camera" aria-hidden="true"></i>拍照记录</label>
      <div class="photo-thumb-add" id="btnFeedPhotoThumb" role="button" tabindex="0">
        <i class="fa-solid fa-camera" aria-hidden="true"></i>
        <span>拍照</span>
      </div>
    </div>

    <div class="basic-field">
      <label class="basic-label" for="feedRemark"><i class="fa-solid fa-pen" aria-hidden="true"></i>备注</label>
      <textarea id="feedRemark" class="form-textarea" placeholder="请输入备注信息"></textarea>
    </div>
  </section>

</div>

<div class="ipad-flow-footer flow-footer-split" data-app-flow-footer>
  <a href="../../任务/备忘录/ipad_task_memo.html" class="btn-memo"><i class="fa-solid fa-microphone" aria-hidden="true"></i> 备忘录</a>
  <button type="button" class="btn-photo" id="btnFeedPhoto"><i class="fa-solid fa-camera" aria-hidden="true"></i> 拍照</button>
  <a href="../../检测/回弹/ipad_inspect_rebound.html" class="btn-primary">下一步</a>
</div>

<script>
(function () {
  var toggle = document.getElementById('feedResultToggle');
  if (toggle) {
    toggle.querySelectorAll('.toggle-opt').forEach(function (opt) {
      opt.addEventListener('click', function () {
        var val = opt.getAttribute('data-val');
        toggle.setAttribute('data-val', val);
        toggle.querySelectorAll('.toggle-opt').forEach(function (o) {
          o.classList.remove('on-pass', 'on-fail');
        });
        if (val === '1') opt.classList.add('on-pass');
        else opt.classList.add('on-fail');
      });
    });
  }

  function openPhoto() {
    alert('拍照：记录馈线检测现场照片（原型演示）。');
  }
  document.getElementById('btnFeedPhoto').addEventListener('click', openPhoto);
  var thumb = document.getElementById('btnFeedPhotoThumb');
  if (thumb) {
    thumb.addEventListener('click', openPhoto);
    thumb.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openPhoto();
      }
    });
  }
})();
</script>
</body>
</html>
