<!DOCTYPE html>
<!-- iPad-SYNC_INDEX v2.1 landscape -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>数据同步</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-basic.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
</head>
<body class="inspect-app-layout ipad-adapt ipad-sync-page" data-inspect-no-memo-toolbar="1" data-inspect-no-photo-recognize="1">
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div id="appNavBar">
  <a href="../../检测/总览/ipad_inspect_index.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">数据同步</span>
  <span style="width:40px;"></span>
</div>

<div id="appEmbedContent" class="sync-page-stack">

  <section class="basic-card sync-net-card" aria-label="网络状态">
    <div class="sync-net-left">
      <i class="fa-solid fa-wifi" aria-hidden="true"></i>
      <span>网络状态</span>
    </div>
    <span class="sync-badge sync-badge--online"><i class="fa-solid fa-circle" aria-hidden="true"></i>在线</span>
  </section>

  <div class="sync-stats-row" role="group" aria-label="同步统计">
    <div class="sync-stat-card">
      <div class="sync-stat-num sync-stat-num--pending">2</div>
      <div class="sync-stat-label">待同步</div>
    </div>
    <div class="sync-stat-card">
      <div class="sync-stat-num sync-stat-num--done">1</div>
      <div class="sync-stat-label">已同步</div>
    </div>
    <div class="sync-stat-card">
      <div class="sync-stat-num sync-stat-num--total">7.5</div>
      <div class="sync-stat-label">总计 MB</div>
    </div>
  </div>

  <h2 class="sync-list-title">同步列表</h2>

  <ul class="sync-list">
    <li class="sync-list-item">
      <div class="sync-item-head">
        <span class="sync-item-name">滨江01#单管塔</span>
        <span class="sync-badge sync-badge--pending">待同步</span>
      </div>
      <div class="sync-item-meta">
        <span><i class="fa-solid fa-database" aria-hidden="true"></i>2.5 MB</span>
        <span>最后编辑: 2026-05-08 09:30</span>
      </div>
    </li>
    <li class="sync-list-item">
      <div class="sync-item-head">
        <span class="sync-item-name">城西03#角钢塔</span>
        <span class="sync-badge sync-badge--pending">待同步</span>
      </div>
      <div class="sync-item-meta">
        <span><i class="fa-solid fa-database" aria-hidden="true"></i>1.8 MB</span>
        <span>最后编辑: 2026-05-07 16:20</span>
      </div>
    </li>
    <li class="sync-list-item">
      <div class="sync-item-head">
        <span class="sync-item-name">拱墅05#三管塔</span>
        <span class="sync-badge sync-badge--done">已同步</span>
      </div>
      <div class="sync-item-meta">
        <span><i class="fa-solid fa-database" aria-hidden="true"></i>3.2 MB</span>
        <span>同步时间: 2026-05-07 18:00</span>
      </div>
    </li>
  </ul>

  <section class="basic-card sync-progress-card" hidden aria-label="同步进度">
    <div class="sync-progress-head">
      <span>同步中...</span>
      <span class="sync-progress-pct">45%</span>
    </div>
    <div class="sync-progress-bar" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100">
      <div class="sync-progress-fill" style="width:45%;"></div>
    </div>
  </section>

</div>

<div class="ipad-flow-footer sync-flow-footer" data-app-flow-footer data-inspect-module-actions="1">
  <button type="button" class="btn-sync-all" id="btnSyncAll">
    <i class="fa-solid fa-cloud-arrow-up" aria-hidden="true"></i>一键同步
  </button>
</div>

<script>
document.getElementById('btnSyncAll').addEventListener('click', function () {
  alert('开始同步待上传数据（原型演示）。');
});
</script>
</body>
</html>
