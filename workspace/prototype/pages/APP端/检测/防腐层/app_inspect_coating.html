<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>防腐层质量</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/app-inspect-layout.css">
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f2f3f5; margin: 0; }
.card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06); }
.banner { background: #e8f3ff; border: 1px solid #bedaff; border-radius: 12px; padding: 10px 12px; margin-bottom: 12px; font-size: 12px; color: #4e5969; line-height: 1.5; }
.card-title { font-size: 15px; font-weight: 600; color: #1d2129; margin: 0 0 6px; }
.card-sub { font-size: 12px; color: #86909c; margin: 0 0 12px; line-height: 1.45; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 14px; }
.data-table { width: 100%; min-width: 520px; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { border: 1px solid #e5e6eb; padding: 8px 10px; text-align: left; }
.data-table th { background: #f7f8fa; color: #4e5969; font-weight: 600; }
.data-table input, .data-table select { width: 100%; border: 1px solid #e5e6eb; border-radius: 8px; padding: 6px 8px; font-size: 13px; box-sizing: border-box; }
.tag-pass { color: #00b42a; font-weight: 600; }
.tag-fail { color: #f53f3f; font-weight: 600; }
.form-label { font-size: 13px; color: #86909c; margin-bottom: 6px; display: block; }
.form-textarea { width: 100%; min-height: 68px; border: 1px solid #e5e6eb; border-radius: 12px; padding: 10px 14px; font-size: 14px; box-sizing: border-box; font-family: inherit; resize: vertical; }
.photo-row { display: flex; gap: 8px; }
.photo-add { width: 72px; height: 72px; border: 2px dashed #e5e6eb; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f7f8fa; cursor: pointer; }
.photo-done { width: 72px; height: 72px; border-radius: 8px; background: #f2f3f5; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #86909c; font-size: 11px; }
</style>
</head>
<body class="inspect-app-layout" data-inspect-module-id="coating" data-inspect-module-name="防腐层质量">
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div id="appNavBar">
  <a href="../../任务/填报主页/app_task_inspect_home.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">防腐层质量</span>
  <span style="width:40px;"></span>
</div>

<div id="appEmbedContent">
  <div class="banner"><i class="fa-solid fa-table" style="color:#165dff;margin-right:6px;"></i>测区矩阵随塔段展开 · 厚度与外观按模板登记</div>

  <div class="card">
    <h2 class="card-title">防腐层测区记录表</h2>
    <p class="card-sub">与模板二维表 / 照片类字段同源</p>
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th>序号</th>
            <th>测区</th>
            <th>厚度(μm)</th>
            <th>外观</th>
            <th>判定</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td><input type="text" value="塔段1北侧"></td>
            <td><input type="number" value="128"></td>
            <td><select><option selected>完好</option><option>起泡</option><option>脱落</option></select></td>
            <td class="tag-pass">合格</td>
          </tr>
          <tr>
            <td>2</td>
            <td><input type="text" value="塔段2东侧"></td>
            <td><input type="number" value="115"></td>
            <td><select><option selected>完好</option><option>起泡</option><option>脱落</option></select></td>
            <td class="tag-pass">合格</td>
          </tr>
          <tr>
            <td>3</td>
            <td><input type="text" value="平台层"></td>
            <td><input type="number" value="92"></td>
            <td><select><option>完好</option><option selected>起泡</option><option>脱落</option></select></td>
            <td class="tag-pass">合格</td>
          </tr>
          <tr>
            <td>4</td>
            <td><input type="text" value="塔脚法兰区"></td>
            <td><input type="number" value="78"></td>
            <td><select><option>完好</option><option>起泡</option><option selected>脱落</option></select></td>
            <td class="tag-fail">不合格</td>
          </tr>
        </tbody>
      </table>
    </div>
    <label class="form-label">测区照片</label>
    <div class="photo-row" style="margin-bottom:14px;">
      <div class="photo-add" id="btnCoatingPhoto" role="button" tabindex="0">
        <i class="fa-solid fa-camera" style="font-size:18px;color:#c9cdd4;"></i>
        <span style="font-size:10px;color:#c9cdd4;margin-top:2px;">拍照</span>
      </div>
      <div class="photo-done"><i class="fa-solid fa-image"></i><span>已拍 4</span></div>
    </div>
    <label class="form-label" for="coatingRemark">备注</label>
    <textarea id="coatingRemark" class="form-textarea" placeholder="请输入备注">塔脚法兰区局部脱落，建议打磨后补涂。</textarea>
  </div>
</div>

<script>
document.getElementById('btnCoatingPhoto').addEventListener('click', function () {
  alert('拍照：记录防腐层测区现场照片（原型演示）。');
});
</script>
</body>
</html>
