<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模板编辑</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
</head>
<body>
<div id="page-content">

  <div class="card" style="margin-bottom:16px;border:1px solid #e8e8ff;background:#fafbff;">
    <div class="card-body" style="padding:12px 16px;font-size:13px;color:var(--text-2);line-height:1.65;">
      <strong style="color:var(--primary)">配置模型</strong>：不同塔型对应不同检测内容集合；<strong>一种塔型仅允许一套「主检测内容」</strong>（多版本通过版本线治理）。左侧树为<strong>检测任务模块</strong>分组；右侧字段支持<strong>标准值</strong>与<strong>二维表</strong>——二维表即附表中<strong>红框类表格</strong>：首列构件类型等行 × 顶行规格/材质/锌层厚度等列，每格一项（参见「角钢（圆管）规格、材质」节）。成品案例见《存量铁塔原始记录附表》。
    </div>
  </div>

  <div style="margin-bottom:16px;">
    <a href="pc_task_template_list.html" class="btn btn-default btn-sm"><i class="fa-solid fa-arrow-left"></i> 返回列表</a>
  </div>

  <!-- 基本信息 -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header">
      <div class="card-title">基本信息</div>
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">模板名称 <span class="required">*</span></label>
          <input type="text" class="form-input" style="width:100%" value="单管塔安全性检测模板">
        </div>
        <div class="form-group">
          <label class="form-label">模板编号</label>
          <input type="text" class="form-input" style="width:100%;background:#f7f8fa" value="RWMB-001" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">适用塔型 <span class="required">*</span></label>
          <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap;">
            <select class="form-select" style="width:100%;max-width:320px;">
              <option selected>单管塔</option>
              <option>拉线杆</option>
              <option>角钢塔</option>
              <option>三管塔</option>
              <option>四管塔</option>
            </select>
            <button type="button" class="btn btn-default btn-sm" id="btn-tower-check" title="校验是否已有同塔型已发布模板"><i class="fa-solid fa-shield-halved"></i> 塔型占用检测</button>
          </div>
          <p class="note" style="margin-top:6px;font-size:12px;color:var(--text-3);">现场执行任务时，系统按<strong>站点塔型</strong>解析唯一模板包；与检测类型共同决定匹配哪条模板版本。</p>
        </div>
        <div class="form-group">
          <label class="form-label">检测类型<span class="required">*</span></label>
          <select class="form-select" style="width:100%">
            <option selected>安全性鉴定</option>
            <option>可靠性鉴定</option>
            <option>抗震鉴定</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">版本</label>
          <input type="text" class="form-input" style="width:100%;background:#f7f8fa" value="V2.0" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">状态</label>
          <div><span class="tag tag-green">已发布</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 检测项配置 -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header">
      <div class="card-title">检测项配置</div>
    </div>
    <div class="card-body">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:60px">序号</th>
            <th>检测项名称</th>
            <th>检测项编码</th>
            <th>父级检测项</th>
            <th style="width:80px">是否必检</th>
            <th style="width:80px">排序</th>
            <th style="width:80px">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td><input type="text" class="form-input" style="width:100%" value="铁塔外观检测"></td>
            <td><input type="text" class="form-input" style="width:100%;background:#f7f8fa" value="TT-001" readonly></td>
            <td>
              <select class="form-select" style="width:100%">
                <option selected>无</option>
              </select>
            </td>
            <td style="text-align:center"><input type="checkbox" checked></td>
            <td><input type="number" class="form-input" style="width:100%" value="1"></td>
            <td class="col-action"><button class="btn btn-text" style="color:var(--danger)">删除</button></td>
          </tr>
          <tr>
            <td>2</td>
            <td><input type="text" class="form-input" style="width:100%" value="基础状况检测"></td>
            <td><input type="text" class="form-input" style="width:100%;background:#f7f8fa" value="TT-002" readonly></td>
            <td>
              <select class="form-select" style="width:100%">
                <option selected>无</option>
              </select>
            </td>
            <td style="text-align:center"><input type="checkbox" checked></td>
            <td><input type="number" class="form-input" style="width:100%" value="2"></td>
            <td class="col-action"><button class="btn btn-text" style="color:var(--danger)">删除</button></td>
          </tr>
          <tr>
            <td>3</td>
            <td><input type="text" class="form-input" style="width:100%" value="基础裂缝检测"></td>
            <td><input type="text" class="form-input" style="width:100%;background:#f7f8fa" value="TT-003" readonly></td>
            <td>
              <select class="form-select" style="width:100%">
                <option>是</option>
                <option selected>基础状况检测</option>
              </select>
            </td>
            <td style="text-align:center"><input type="checkbox" checked></td>
            <td><input type="number" class="form-input" style="width:100%" value="3"></td>
            <td class="col-action"><button class="btn btn-text" style="color:var(--danger)">删除</button></td>
          </tr>
          <tr>
            <td>4</td>
            <td><input type="text" class="form-input" style="width:100%" value="塔身垂直度检测"></td>
            <td><input type="text" class="form-input" style="width:100%;background:#f7f8fa" value="TT-004" readonly></td>
            <td>
              <select class="form-select" style="width:100%">
                <option selected>无</option>
              </select>
            </td>
            <td style="text-align:center"><input type="checkbox" checked></td>
            <td><input type="number" class="form-input" style="width:100%" value="4"></td>
            <td class="col-action"><button class="btn btn-text" style="color:var(--danger)">删除</button></td>
          </tr>
          <tr>
            <td>5</td>
            <td><input type="text" class="form-input" style="width:100%" value="防腐层检测"></td>
            <td><input type="text" class="form-input" style="width:100%;background:#f7f8fa" value="TT-005" readonly></td>
            <td>
              <select class="form-select" style="width:100%">
                <option selected>无</option>
              </select>
            </td>
            <td style="text-align:center"><input type="checkbox"></td>
            <td><input type="number" class="form-input" style="width:100%" value="5"></td>
            <td class="col-action"><button class="btn btn-text" style="color:var(--danger)">删除</button></td>
          </tr>
        </tbody>
      </table>
      <div style="padding:12px 0;">
        <button class="btn btn-default"><i class="fa-solid fa-plus"></i> 添加检测项</button>
      </div>
    </div>
  </div>

  <div class="form-footer">
    <button class="btn btn-default">保存草稿</button>
    <button class="btn btn-primary">发布</button>
  </div>

</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>window.__layoutConfig = {active:'task_template_list', breadcrumb:['模板配置','任务模板管理','模板编辑']};</script>
<script>
document.getElementById('btn-tower-check').addEventListener('click', function () {
  alert('塔型「单管塔」+ 检测类型「安全性鉴定」：已有已发布模板 RWMB-001、RWMB-006。新建内容请走版本升级或更换检测类型。');
});
</script>
</body>
</html>
