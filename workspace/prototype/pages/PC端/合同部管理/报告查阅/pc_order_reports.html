<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告查询 - 通信铁塔检测系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
</head>
<body>
<div id="page-content">

  <div class="card">
    <div class="card-body">
      <p style="font-size:12px;color:var(--text-3);margin:0 0 12px;line-height:1.5">
        <i class="fa-solid fa-circle-info"></i> 本页仅展示<strong>审核通过</strong>的报告，供查阅、预览与下载；编制中、待审核等报告请在「报告编制 / 报告审核」中处理。
      </p>
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" class="form-input" placeholder="报告名称/编号" style="width:180px">
          <select class="form-select">
            <option>全部检测类型</option>
            <option>安全性鉴定</option>
            <option>可靠性鉴定</option>
            <option>抗震鉴定</option>
          </select>
          <button class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i> 查询</button>
          <button class="btn btn-default"><i class="fa-solid fa-rotate-right"></i> 重置</button>
        </div>
      </div>

      <div class="pc-table-actions">
        <button class="btn btn-default"><i class="fa-solid fa-file-export"></i> 导出</button>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th style="width:130px">报告编号</th>
            <th>报告名称</th>
            <th>关联订单</th>
            <th>检测类型</th>
            <th>编制</th>
            <th style="width:110px">生成时间</th>
            <th class="col-action" style="width:180px">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>BG202605001</td>
            <td>拱墅05#三管塔安全性鉴定报</td>
            <td>DD202605003</td>
            <td>安全性鉴定</td>
            <td>王强</td>
            <td>2026-05-06</td>
            <td class="col-action">
              <button class="btn-text"><i class="fa-solid fa-eye"></i> 在线预览</button>
              <button class="btn-text"><i class="fa-solid fa-file-pdf"></i> 下载PDF</button>
            </td>
          </tr>
          <tr>
            <td>BG202605002</td>
            <td>城西03#角钢塔可靠性鉴定报</td>
            <td>DD202605002</td>
            <td>可靠性鉴定</td>
            <td>李明</td>
            <td>2026-05-05</td>
            <td class="col-action">
              <button class="btn-text"><i class="fa-solid fa-eye"></i> 在线预览</button>
              <button class="btn-text"><i class="fa-solid fa-file-pdf"></i> 下载PDF</button>
            </td>
          </tr>
          <tr>
            <td>BG202605005</td>
            <td>下沙02#三管塔安全性鉴定报</td>
            <td>DD202605006</td>
            <td>安全性鉴定</td>
            <td>王强</td>
            <td>2026-05-02</td>
            <td class="col-action">
              <button class="btn-text"><i class="fa-solid fa-eye"></i> 在线预览</button>
              <button class="btn-text"><i class="fa-solid fa-file-pdf"></i> 下载PDF</button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="pagination">
        <span>共 3 条</span>
        <div class="pagination-btns">
          <button class="page-btn"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">4</button>
          <button class="page-btn">5</button>
          <button class="page-btn"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>window.__layoutConfig = {active:'order_reports', breadcrumb:['统计分析','报告查询']};</script>
</body>
</html>
