<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>派单 - 通信铁塔检测系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
</head>
<body>
<div id="page-content">

  <div class="page-header">
    <div class="page-title">派单</div>
  </div>

  <div class="card" style="max-width:640px">
    <div class="card-header">
      <div class="card-title">指派检测单位</div>
    </div>
    <div class="card-body">

      <!-- 只读订单信息 -->
      <div style="background:#F7F8FA;border-radius:6px;padding:16px;margin-bottom:20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
          <div>
            <span style="color:var(--text-3)">订单编码</span>
            <span style="color:var(--text-1);font-weight:500">ZJHBJ20260506001</span>
          </div>
          <div>
            <span style="color:var(--text-3)">检测类型：</span>
            <span style="color:var(--text-1)">安全性鉴定</span>
          </div>
          <div>
            <span style="color:var(--text-3)">订单名称</span>
            <span style="color:var(--text-1)">滨江基站安全性鉴定</span>
          </div>
          <div>
            <span style="color:var(--text-3)">站址编码</span>
            <span style="color:var(--text-1)">ZZ-HZ-BJ01</span>
          </div>
          <div>
            <span style="color:var(--text-3)">站点名称</span>
            <span style="color:var(--text-1)">滨江江南大道站</span>
          </div>
        </div>
      </div>

      <!-- 派单表单：将订单指派至检测单位（与「派单管理」一致） -->
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">选择检测单位 <span class="required">*</span></label>
        <select class="form-select" style="width:100%">
          <option value="">请选择（来源于基础数据 → 检测单位）</option>
          <option>浙江中能工程检测有限公司</option>
          <option>华东某外协检测有限公司</option>
          <option>浙江华测工程检测有限公司</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">备注</label>
        <textarea class="form-textarea" placeholder="请输入备注信息（选填）"></textarea>
      </div>

    </div>
    <div class="form-footer">
      <a href="../订单管理/pc_order_list.html" class="btn btn-default">取消</a>
      <button class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> 确认派单</button>
    </div>
  </div>

</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>window.__layoutConfig = {active:'order_list', breadcrumb:['营销管理','订单管理','派单']};</script>
</body>
</html>
