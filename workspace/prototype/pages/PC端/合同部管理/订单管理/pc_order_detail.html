        <textarea id="pcAuditRemark" class="form-textarea" style="width:100%;min-height:72px;margin-top:8px"></textarea>

    </div>
  </div>
</div>

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/"/g, '&quot;');
}

function renderBase(code, d) {
  var el = document.getElementById('odBase');
  var rows = [
    ['订单编码', code], ['订单名称', d.orderName], ['关联合同', d.contract || '—'],
    ['站址编码', d.siteAddrCode], ['站点名称', d.siteName || '—'], ['关联工程', d.project], ['检测单位', d.unit], ['检测类型', d.inspectType],
    ['订单状态', d.status], ['催办状态', d.urgeStatus], ['派单时间', d.dispatchAt],
    ['截止日期', d.deadline], ['是否过期', d.overdue], ['检测人', d.inspector],
    ['创建人', d.creator], ['联系电话', d.contact], ['备注', d.remark]
  ];
  el.innerHTML = rows.map(function (r) {
    return '<dt>' + esc(r[0]) + '</dt><dd>' + esc(r[1]) + '</dd>';
  }).join('');
}

function renderUrges(list) {
  var wrap = document.getElementById('odUrgeWrap');
  if (!list || !list.length) {
    wrap.innerHTML = '<p class="od-empty">暂无催办记录。</p>';
    return;
  }
  var thead = '<thead><tr><th style="width:160px">催办时间</th><th style="width:100px">催办人</th><th style="width:120px">渠道</th><th>通知对象</th><th>催办说明</th></tr></thead>';
  var body = list.map(function (u) {
    return '<tr><td>' + esc(u.time) + '</td><td>' + esc(u.operator) + '</td><td>' + esc(u.channel) + '</td><td>' + esc(u.target) + '</td><td>' + esc(u.content) + '</td></tr>';
  }).join('');
  wrap.innerHTML = '<div class="pc-table-actions">' +
      '<a href="pc_order_list.html" class="btn btn-default"><i class="fa-solid fa-arrow-left"></i> 返回列表</a>' +
    '</div>' +
    '<table class="data-table">' + thead + '<tbody>' + body + '</tbody></table>';
}

function renderRejects(list) {
  var wrap = document.getElementById('odRejectWrap');
  if (!list || !list.length) {
    wrap.innerHTML = '<p class="od-empty">暂无拒绝或驳回记录。</p>';
    return;
  }
  var thead = '<thead><tr><th style="width:160px">时间</th><th style="width:100px">操作人</th><th style="width:100px">身份</th><th style="width:140px">所属单位</th><th style="width:100px">类型</th><th>原因说明</th></tr></thead>';
  var body = list.map(function (r) {
    return '<tr><td>' + esc(r.time) + '</td><td>' + esc(r.actor) + '</td><td>' + esc(r.role) + '</td><td>' + esc(r.unit) + '</td><td>' + esc(r.action) + '</td><td>' + esc(r.reason) + '</td></tr>';
  }).join('');
  wrap.innerHTML = '<table class="data-table">' + thead + '<tbody>' + body + '</tbody></table>';
}
