<script>window.__layoutConfig = {active:'data_segment_style', breadcrumb:['基础数据','塔段样式信息']};</script>
<script>
  (function () {
    function getModal() {
      return document.getElementById('create-modal');
    }
    function openModal() {
      const modal = getModal();
      if (modal) modal.classList.add('open');
    }
    function closeModal() {
      const modal = getModal();
      if (modal) modal.classList.remove('open');
    }

    document.addEventListener('click', function (e) {
      const target = e.target;
      if (!(target instanceof Element)) return;

      if (target.closest('#open-create-modal')) {
        openModal();
        return;
      }
      if (target.closest('#close-create-modal') || target.closest('#cancel-create-modal')) {
        closeModal();
        return;
      }
      const modal = getModal();
      if (modal && target === modal) {
        closeModal();
      }
    });
  })();
</script>
