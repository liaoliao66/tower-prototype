<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>检测类型 - 通信铁塔检测系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
<style>
  .it-modal-mask { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:2000; display:none; align-items:center; justify-content:center; padding:20px; }
  .it-modal-mask.open { display:flex; }
  .it-modal-dialog { background:#fff; border-radius:8px; width:min(560px,96vw); max-height:90vh; overflow:auto; box-shadow:0 12px 48px rgba(0,0,0,.18); }
  .it-modal-head { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .it-modal-head h3 { margin:0; font-size:16px; font-weight:600; color:var(--text-1); }
  .it-modal-close { border:none; background:transparent; cursor:pointer; color:var(--text-3); padding:4px 8px; font-size:16px; line-height:1; }
  .it-modal-body { padding:18px 20px; }
  .it-modal-foot { padding:12px 18px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
  .it-pick-list { border:1px solid var(--border); border-radius:8px; padding:8px 12px; max-height:180px; overflow-y:auto; background:#FAFBFC; }
  .it-pick-item { display:flex; align-items:flex-start; gap:8px; padding:8px 0; cursor:pointer; font-size:13px; color:var(--text-2); border-bottom:1px solid var(--border); }
  .it-pick-item:last-child { border-bottom:none; }
  .it-pick-item input { margin-top:3px; flex-shrink:0; accent-color:var(--primary); }
  .it-dev-readonly { border:1px solid var(--border); border-radius:8px; padding:10px 14px; background:#F7F8FA; font-size:13px; color:var(--text-2); line-height:1.6; min-height:40px; }
</style>
</head>
<body>
<div id="page-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">检测类型</div>
    </div>
    <div class="card-body">
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" class="form-input" placeholder="编码/名称">
          <button type="button" class="btn btn-primary">查询</button>
          <button type="button" class="btn btn-default">重置</button>
        </div>
      </div>

      <div class="pc-table-actions">
        <button type="button" class="btn btn-primary" id="btnInspectTypeAdd"><i class="fa-solid fa-plus"></i> 新增</button>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>编码</th>
            <th>名称</th>
            <th>所需使用设备类型</th>
            <th>启用状态</th>
            <th class="col-action" style="width:260px">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr data-code="INSP-AQ" data-name="安全性鉴定" data-devtypes="DEV-T-CL,DEV-T-NDT" data-devlabels="测量仪器、无损检测" data-status="1">
            <td>INSP-AQ</td>
            <td>安全性鉴定</td>
            <td class="it-dev-cell">测量仪器、无损检测</td>
            <td class="it-status-cell"><span class="tag tag-green">启用</span></td>
            <td class="col-action">
              <button type="button" class="btn btn-text btn-it-detail">详情</button>
              <button type="button" class="btn btn-text btn-it-edit">编辑</button>
              <button type="button" class="btn btn-text btn-it-toggle" style="color:var(--warning)">禁用</button>
              <button type="button" class="btn btn-text btn-it-delete" style="color:var(--danger)">删除</button>
            </td>
          </tr>
          <tr data-code="INSP-DQ" data-name="定期检测" data-devtypes="DEV-T-CL" data-devlabels="测量仪器" data-status="1">
            <td>INSP-DQ</td>
            <td>定期检测</td>
            <td class="it-dev-cell">测量仪器</td>
            <td class="it-status-cell"><span class="tag tag-green">启用</span></td>
            <td class="col-action">
              <button type="button" class="btn btn-text btn-it-detail">详情</button>
              <button type="button" class="btn btn-text btn-it-edit">编辑</button>
              <button type="button" class="btn btn-text btn-it-toggle" style="color:var(--warning)">禁用</button>
              <button type="button" class="btn btn-text btn-it-delete" style="color:var(--danger)">删除</button>
            </td>
          </tr>
          <tr data-code="INSP-TZ" data-name="铁塔垂直度专项" data-devtypes="DEV-T-CL" data-devlabels="测量仪器" data-status="0">
            <td>INSP-TZ</td>
            <td>铁塔垂直度专项</td>
            <td class="it-dev-cell">测量仪器</td>
            <td class="it-status-cell"><span class="tag tag-gray">停用</span></td>
            <td class="col-action">
              <button type="button" class="btn btn-text btn-it-detail">详情</button>
              <button type="button" class="btn btn-text btn-it-edit">编辑</button>
              <button type="button" class="btn btn-text btn-it-toggle" style="color:var(--success)">启用</button>
              <button type="button" class="btn btn-text btn-it-delete" style="color:var(--danger)">删除</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="pagination">
        <span>共 3 条记录</span>
        <div class="pagination-btns"><button type="button" class="page-btn active">1</button></div>
      </div>
    </div>
  </div>

  <div class="it-modal-mask" id="inspectTypeModal" aria-hidden="true">
    <div class="it-modal-dialog" role="dialog" aria-labelledby="inspectTypeModalTitle">
      <div class="it-modal-head">
        <h3 id="inspectTypeModalTitle">新增检测类型</h3>
        <button type="button" class="it-modal-close" id="inspectTypeModalClose" aria-label="关闭"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="it-modal-body">
        <div class="form-grid" style="grid-template-columns:1fr">
          <div class="form-group">
            <span class="form-label">编码<span class="required">*</span></span>
            <input type="text" class="form-input" id="inspectTypeFormCode" placeholder="如 INSP-XXX" style="width:100%">
          </div>
          <div class="form-group">
            <span class="form-label">名称<span class="required">*</span></span>
            <input type="text" class="form-input" id="inspectTypeFormName" placeholder="请输入检测类型名称" style="width:100%">
          </div>
          <div class="form-group full" id="inspectTypeDevGroup">
            <span class="form-label">所需使用设备类型<span class="required">*</span></span>
            <p id="inspectTypeDevHint" style="font-size:12px;color:var(--text-3);margin:0 0 8px">可多选，选项来自「设备类型」主数据。</p>
            <div class="it-pick-list" id="inspectTypeDevPick">
              <label class="it-pick-item"><input type="checkbox" name="inspectTypeDevRef" value="DEV-T-CL"><span>DEV-T-CL　测量仪器</span></label>
              <label class="it-pick-item"><input type="checkbox" name="inspectTypeDevRef" value="DEV-T-NDT"><span>DEV-T-NDT　无损检测</span></label>
              <label class="it-pick-item"><input type="checkbox" name="inspectTypeDevRef" value="DEV-T-MEC"><span>DEV-T-MEC　力学试验</span></label>
            </div>
            <div class="it-dev-readonly" id="inspectTypeDevReadonly" style="display:none"></div>
          </div>
          <div class="form-group">
            <span class="form-label">启用状态</span>
            <select class="form-select" id="inspectTypeFormStatus" style="width:100%">
              <option value="1" selected>启用</option>
              <option value="0">停用</option>
            </select>
          </div>
        </div>
      </div>
      <div class="it-modal-foot">
        <button type="button" class="btn btn-default" id="inspectTypeModalCancel">关闭</button>
        <button type="button" class="btn btn-primary" id="inspectTypeModalSave">保存</button>
      </div>
    </div>
  </div>
</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>window.__layoutConfig = { active: 'data_inspect_type', breadcrumb: ['基础数据', '检测类型'] };</script>
<script>
(function () {
  var DEV_LABELS = { 'DEV-T-CL': '测量仪器', 'DEV-T-NDT': '无损检测', 'DEV-T-MEC': '力学试验' };
  var modalMode = 'add';
  var editingRow = null;

  function getModal() { return document.getElementById('inspectTypeModal'); }
  function clearDevChecks() {
    document.querySelectorAll('input[name="inspectTypeDevRef"]').forEach(function (c) { c.checked = false; });
  }
  function setDevChecks(codes) {
    clearDevChecks();
    if (!codes) return;
    codes.split(',').forEach(function (code) {
      var c = document.querySelector('input[name="inspectTypeDevRef"][value="' + code.trim() + '"]');
      if (c) c.checked = true;
    });
  }
  function selectedDevTypes() {
    var a = [];
    document.querySelectorAll('input[name="inspectTypeDevRef"]:checked').forEach(function (c) { a.push(c.value); });
    return a;
  }
  function labelsFromCodes(codes) {
    return codes.split(',').map(function (c) { return DEV_LABELS[c.trim()] || c.trim(); }).filter(Boolean).join('、');
  }
  function setDevPickVisible(editable) {
    var pick = document.getElementById('inspectTypeDevPick');
    var ro = document.getElementById('inspectTypeDevReadonly');
    var hint = document.getElementById('inspectTypeDevHint');
    if (pick) pick.style.display = editable ? '' : 'none';
    if (hint) hint.style.display = editable ? '' : 'none';
    if (ro) ro.style.display = editable ? 'none' : '';
  }
  function setFormReadonly(readonly) {
    var code = document.getElementById('inspectTypeFormCode');
    var name = document.getElementById('inspectTypeFormName');
    var status = document.getElementById('inspectTypeFormStatus');
    [code, name].forEach(function (el) {
      if (!el) return;
      if (readonly) {
        el.setAttribute('readonly', 'readonly');
        el.style.background = '#F7F8FA';
        el.style.pointerEvents = 'none';
      } else {
        el.removeAttribute('readonly');
        el.style.background = '';
        el.style.pointerEvents = '';
      }
    });
    if (status) {
      status.disabled = readonly;
      status.style.background = readonly ? '#F7F8FA' : '';
      status.style.pointerEvents = readonly ? 'none' : '';
    }
  }
  function openModal(mode, row) {
    var m = getModal();
    if (!m) return;
    modalMode = mode;
    editingRow = row || null;
    var saveBtn = document.getElementById('inspectTypeModalSave');
    var codeEl = document.getElementById('inspectTypeFormCode');
    var nameEl = document.getElementById('inspectTypeFormName');
    var statusEl = document.getElementById('inspectTypeFormStatus');
    var roDev = document.getElementById('inspectTypeDevReadonly');

    if (mode === 'add') {
      codeEl.value = '';
      nameEl.value = '';
      statusEl.value = '1';
      clearDevChecks();
      setDevPickVisible(true);
      setFormReadonly(false);
      document.getElementById('inspectTypeModalTitle').textContent = '新增检测类型';
      if (saveBtn) saveBtn.style.display = '';
    } else if (row) {
      codeEl.value = row.dataset.code || '';
      nameEl.value = row.dataset.name || '';
      statusEl.value = row.dataset.status === '1' ? '1' : '0';
      if (mode === 'detail') {
        document.getElementById('inspectTypeModalTitle').textContent = '检测类型详情';
        setDevPickVisible(false);
        if (roDev) roDev.textContent = row.dataset.devlabels || row.querySelector('.it-dev-cell').textContent || '—';
        setFormReadonly(true);
        if (saveBtn) saveBtn.style.display = 'none';
      } else {
        document.getElementById('inspectTypeModalTitle').textContent = '编辑检测类型';
        setDevChecks(row.dataset.devtypes || '');
        setDevPickVisible(true);
        codeEl.setAttribute('readonly', 'readonly');
        codeEl.style.background = '#F7F8FA';
        codeEl.style.pointerEvents = 'none';
        nameEl.removeAttribute('readonly');
        nameEl.style.background = '';
        nameEl.style.pointerEvents = '';
        statusEl.disabled = false;
        statusEl.style.background = '';
        statusEl.style.pointerEvents = '';
        if (saveBtn) saveBtn.style.display = '';
      }
    }
    m.classList.add('open');
    m.setAttribute('aria-hidden', 'false');
  }
  function closeModal() {
    var m = getModal();
    if (!m) return;
    m.classList.remove('open');
    m.setAttribute('aria-hidden', 'true');
    setFormReadonly(false);
    setDevPickVisible(true);
    document.getElementById('inspectTypeFormCode').removeAttribute('readonly');
    editingRow = null;
  }
  function renderStatus(row, enabled) {
    var cell = row.querySelector('.it-status-cell');
    var toggle = row.querySelector('.btn-it-toggle');
    row.dataset.status = enabled ? '1' : '0';
    if (cell) cell.innerHTML = enabled ? '<span class="tag tag-green">启用</span>' : '<span class="tag tag-gray">停用</span>';
    if (toggle) {
      toggle.textContent = enabled ? '禁用' : '启用';
      toggle.style.color = enabled ? 'var(--warning)' : 'var(--success)';
    }
  }

  window.addEventListener('DOMContentLoaded', function () {
    document.getElementById('btnInspectTypeAdd').addEventListener('click', function () { openModal('add'); });
    ['inspectTypeModalClose', 'inspectTypeModalCancel'].forEach(function (id) {
      document.getElementById(id).addEventListener('click', closeModal);
    });
    document.getElementById('inspectTypeModalSave').addEventListener('click', function () {
      var code = document.getElementById('inspectTypeFormCode').value.trim();
      var name = document.getElementById('inspectTypeFormName').value.trim();
      var devs = selectedDevTypes();
      if (!code || !name) { alert('请填写编码与名称'); return; }
      if (!devs.length) { alert('请至少选择一种所需使用设备类型'); return; }
      if (modalMode === 'edit' && editingRow) {
        var labels = labelsFromCodes(devs.join(','));
        editingRow.dataset.name = name;
        editingRow.dataset.devtypes = devs.join(',');
        editingRow.dataset.devlabels = labels;
        editingRow.dataset.status = document.getElementById('inspectTypeFormStatus').value;
        editingRow.cells[1].textContent = name;
        var devCell = editingRow.querySelector('.it-dev-cell');
        if (devCell) devCell.textContent = labels;
        renderStatus(editingRow, editingRow.dataset.status === '1');
        alert('已保存（原型）');
      } else {
        alert('将保存检测类型「' + code + ' / ' + name + '」，设备类型：' + devs.join('、'));
      }
      closeModal();
    });
    getModal().addEventListener('click', function (e) { if (e.target === getModal()) closeModal(); });
    document.querySelector('tbody').addEventListener('click', function (e) {
      var row = e.target.closest('tr[data-code]');
      if (!row) return;
      if (e.target.closest('.btn-it-detail')) openModal('detail', row);
      if (e.target.closest('.btn-it-edit')) openModal('edit', row);
      if (e.target.closest('.btn-it-toggle')) {
        var enabled = row.dataset.status !== '1';
        renderStatus(row, enabled);
        alert((enabled ? '已启用' : '已停用') + '：' + row.dataset.code);
      }
      if (e.target.closest('.btn-it-delete')) {
        var label = (row.dataset.name || '') + '（' + (row.dataset.code || '') + '）';
        if (confirm('确定要删除「' + label + '」吗？删除后不可恢复。')) alert('已删除（原型）');
      }
    });
  });
})();
</script>
</body>
</html>
