<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新增设备 - 通信铁塔检测系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
</head>
<body>
<div id="page-content">
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="pc_data_device_list.html" class="btn btn-default btn-sm"><i class="fa-solid fa-arrow-left"></i> 返回列表</a>
      <h1 class="page-title">新增设备</h1>
    </div>
  </div>
  <div class="card">
    <div class="card-body">
      <p style="font-size:12px;color:var(--text-3);margin:0 0 16px">设备归属当前检测单位；标 <span class="required">*</span> 为必填。</p>
      <div class="form-section">
        <div class="form-section-title">设备档案</div>
        <div class="form-grid form-grid-3">
          <div class="form-group">
            <span class="form-label">设备编码<span class="required">*</span></span>
            <input class="form-input" placeholder="本单位内唯一">
          </div>
          <div class="form-group">
            <span class="form-label">设备名称<span class="required">*</span></span>
            <input class="form-input" placeholder="请输入设备名称">
          </div>
          <div class="form-group">
            <span class="form-label">设备类型<span class="required">*</span></span>
            <select class="form-select" style="width:100%">
              <option value="">请选择（基础数据-设备类型）</option>
              <option>测量仪器</option>
              <option>无损检测</option>
              <option>力学试验</option>
            </select>
          </div>
          <div class="form-group">
            <span class="form-label">规格型号</span>
            <input class="form-input" placeholder="规格型号">
          </div>
          <div class="form-group">
            <span class="form-label">生产厂家</span>
            <input class="form-input" placeholder="生产厂家">
          </div>
          <div class="form-group">
            <span class="form-label">出厂编号</span>
            <input class="form-input" placeholder="出厂编号">
          </div>
          <div class="form-group">
            <span class="form-label">购置时间</span>
            <input class="form-input" type="date">
          </div>
          <div class="form-group">
            <span class="form-label">检定周期</span>
            <input class="form-input" placeholder="如 12 个月">
          </div>
          <div class="form-group">
            <span class="form-label">溯源方式</span>
            <select class="form-select" style="width:100%">
              <option value="">请选择</option>
              <option>检定</option>
              <option>校准</option>
              <option>自校</option>
              <option>其他</option>
            </select>
          </div>
          <div class="form-group">
            <span class="form-label">有效期</span>
            <input class="form-input" type="date" title="证书或溯源有效期">
          </div>
          <div class="form-group full">
            <span class="form-label">检定证书号</span>
            <input class="form-input" style="width:100%" placeholder="检定/校准证书编号">
          </div>
        </div>
      </div>
      <div class="form-footer">
        <button type="button" class="btn btn-primary">保存</button>
        <button type="button" class="btn btn-default" onclick="location.href='pc_data_device_list.html'">取消</button>
      </div>
    </div>
  </div>
</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>window.__layoutConfig = { active: 'data_device', breadcrumb: ['基础数据', '设备管理', '新增设备'] };</script>
</body>
</html>
