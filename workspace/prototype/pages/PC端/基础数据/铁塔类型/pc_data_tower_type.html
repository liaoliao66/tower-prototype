<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>铁塔类型 - 通信铁塔检测系统</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
<style>
  .tt-type-modal-mask { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:2000; display:none; align-items:center; justify-content:center; padding:20px; }
  .tt-type-modal-mask.open { display:flex; }
  .tt-type-modal-dialog { background:#fff; border-radius:8px; width:min(480px,96vw); max-height:88vh; overflow:auto; box-shadow:0 12px 48px rgba(0,0,0,.18); }
  .tt-type-modal-head { padding:14px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .tt-type-modal-head h3 { margin:0; font-size:16px; font-weight:600; color:var(--text-1); }
  .tt-type-modal-close { border:none; background:transparent; cursor:pointer; color:var(--text-3); padding:4px 8px; font-size:16px; line-height:1; }
  .tt-type-modal-body { padding:18px 20px; }
  .tt-type-modal-foot { padding:12px 18px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; }
</style>
</head>
<body>
<div id="page-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">铁塔类型</div>
    </div>
    <div class="card-body">
      <div class="toolbar">
        <div class="toolbar-left">
          <input type="text" class="form-input" placeholder="编码/名称">
          <button type="button" class="btn btn-primary">查询</button>
          <button type="button" class="btn btn-default">重置</button>
        </div>
      </div>

      <div class="pc-table-actions">
        <button type="button" class="btn btn-primary" id="btnTowerTypeAdd"><i class="fa-solid fa-plus"></i> 新增</button>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>编码</th>
            <th>名称</th>
            <th>启用状态</th>
            <th class="col-action" style="width:260px">操作</th>
          </tr>
        </thead>
        <tbody>
          <tr data-code="TT01" data-name="单管塔" data-status="1">
            <td>TT01</td>
            <td>单管塔</td>
            <td class="tt-status-cell"><span class="tag tag-green">启用</span></td>
            <td class="col-action">
              <button type="button" class="btn btn-text btn-tt-detail">详情</button>
              <button type="button" class="btn btn-text btn-tt-edit">编辑</button>
              <button type="button" class="btn btn-text btn-tt-toggle" style="color:var(--warning)">禁用</button>
              <button type="button" class="btn btn-text btn-tt-delete" style="color:var(--danger)">删除</button>
            </td>
          </tr>
          <tr data-code="TT02" data-name="角钢塔" data-status="1">
            <td>TT02</td>
            <td>角钢塔</td>
            <td class="tt-status-cell"><span class="tag tag-green">启用</span></td>
            <td class="col-action">
              <button type="button" class="btn btn-text btn-tt-detail">详情</button>
              <button type="button" class="btn btn-text btn-tt-edit">编辑</button>
              <button type="button" class="btn btn-text btn-tt-toggle" style="color:var(--warning)">禁用</button>
              <button type="button" class="btn btn-text btn-tt-delete" style="color:var(--danger)">删除</button>
            </td>
          </tr>
          <tr data-code="TT03" data-name="三管塔" data-status="0">
            <td>TT03</td>
            <td>三管塔</td>
            <td class="tt-status-cell"><span class="tag tag-gray">停用</span></td>
            <td class="col-action">
              <button type="button" class="btn btn-text btn-tt-detail">详情</button>
              <button type="button" class="btn btn-text btn-tt-edit">编辑</button>
              <button type="button" class="btn btn-text btn-tt-toggle" style="color:var(--success)">启用</button>
              <button type="button" class="btn btn-text btn-tt-delete" style="color:var(--danger)">删除</button>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="pagination">
        <span>共 3 条记录</span>
        <div class="pagination-btns"><button type="button" class="page-btn active">1</button></div>
      </div>
    </div>
  </div>

  <div class="tt-type-modal-mask" id="towerTypeModal" aria-hidden="true">
    <div class="tt-type-modal-dialog" role="dialog" aria-labelledby="towerTypeModalTitle">
      <div class="tt-type-modal-head">
        <h3 id="towerTypeModalTitle">新增铁塔类型</h3>
        <button type="button" class="tt-type-modal-close" id="towerTypeModalClose" aria-label="关闭"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="tt-type-modal-body">
        <div class="form-grid" style="grid-template-columns:1fr">
          <div class="form-group">
            <span class="form-label">编码<span class="required">*</span></span>
            <input type="text" class="form-input" id="towerTypeFormCode" placeholder="如 TT04" style="width:100%">
          </div>
          <div class="form-group">
            <span class="form-label">名称<span class="required">*</span></span>
            <input type="text" class="form-input" id="towerTypeFormName" placeholder="请输入类型名称" style="width:100%">
          </div>
          <div class="form-group">
            <span class="form-label">启用状态</span>
            <select class="form-select" id="towerTypeFormStatus" style="width:100%">
              <option value="1" selected>启用</option>
              <option value="0">停用</option>
            </select>
          </div>
        </div>
      </div>
      <div class="tt-type-modal-foot">
        <button type="button" class="btn btn-default" id="towerTypeModalCancel">关闭</button>
        <button type="button" class="btn btn-primary" id="towerTypeModalSave">保存</button>
      </div>
    </div>
  </div>
</div>
<script src="../../../../assets/shared-layout.js"></script>
<script>window.__layoutConfig = { active: 'data_tower_type', breadcrumb: ['基础数据', '铁塔类型'] };</script>
<script>
(function () {
  var modalMode = 'add';
  var editingRow = null;

  function getModal() { return document.getElementById('towerTypeModal'); }
  function setReadonly(readonly) {
    var code = document.getElementById('towerTypeFormCode');
    var name = document.getElementById('towerTypeFormName');
    var status = document.getElementById('towerTypeFormStatus');
    [code, name].forEach(function (el) {
      if (!el) return;
      if (readonly) {
        el.setAttribute('readonly', 'readonly');
        el.style.background = '#F7F8FA';
        el.style.pointerEvents = 'none';
      } else {
        el.removeAttribute('readonly');
        el.style.background = '';
        el.style.pointerEvents = '';
      }
    });
    if (status) {
      status.disabled = readonly;
      status.style.background = readonly ? '#F7F8FA' : '';
      status.style.pointerEvents = readonly ? 'none' : '';
    }
  }
  function openModal(mode, row) {
    var m = getModal();
    if (!m) return;
    modalMode = mode;
    editingRow = row || null;
    var saveBtn = document.getElementById('towerTypeModalSave');
    var codeEl = document.getElementById('towerTypeFormCode');
    var nameEl = document.getElementById('towerTypeFormName');
    var statusEl = document.getElementById('towerTypeFormStatus');

    if (mode === 'add') {
      codeEl.value = '';
      nameEl.value = '';
      statusEl.value = '1';
      document.getElementById('towerTypeModalTitle').textContent = '新增铁塔类型';
      setReadonly(false);
      if (saveBtn) saveBtn.style.display = '';
    } else if (row) {
      codeEl.value = row.dataset.code || '';
      nameEl.value = row.dataset.name || '';
      statusEl.value = row.dataset.status === '1' ? '1' : '0';
      if (mode === 'detail') {
        document.getElementById('towerTypeModalTitle').textContent = '铁塔类型详情';
        setReadonly(true);
        if (saveBtn) saveBtn.style.display = 'none';
      } else {
        document.getElementById('towerTypeModalTitle').textContent = '编辑铁塔类型';
        codeEl.setAttribute('readonly', 'readonly');
        codeEl.style.background = '#F7F8FA';
        codeEl.style.pointerEvents = 'none';
        nameEl.removeAttribute('readonly');
        nameEl.style.background = '';
        nameEl.style.pointerEvents = '';
        statusEl.disabled = false;
        statusEl.style.background = '';
        statusEl.style.pointerEvents = '';
        if (saveBtn) saveBtn.style.display = '';
      }
    }
    m.classList.add('open');
    m.setAttribute('aria-hidden', 'false');
  }
  function closeModal() {
    var m = getModal();
    if (!m) return;
    m.classList.remove('open');
    m.setAttribute('aria-hidden', 'true');
    setReadonly(false);
    document.getElementById('towerTypeFormCode').removeAttribute('readonly');
    editingRow = null;
  }
  function renderStatus(row, enabled) {
    var cell = row.querySelector('.tt-status-cell');
    var toggle = row.querySelector('.btn-tt-toggle');
    row.dataset.status = enabled ? '1' : '0';
    if (cell) cell.innerHTML = enabled ? '<span class="tag tag-green">启用</span>' : '<span class="tag tag-gray">停用</span>';
    if (toggle) {
      toggle.textContent = enabled ? '禁用' : '启用';
      toggle.style.color = enabled ? 'var(--warning)' : 'var(--success)';
    }
  }

  window.addEventListener('DOMContentLoaded', function () {
    document.getElementById('btnTowerTypeAdd').addEventListener('click', function () { openModal('add'); });
    ['towerTypeModalClose', 'towerTypeModalCancel'].forEach(function (id) {
      document.getElementById(id).addEventListener('click', closeModal);
    });
    document.getElementById('towerTypeModalSave').addEventListener('click', function () {
      var code = document.getElementById('towerTypeFormCode').value.trim();
      var name = document.getElementById('towerTypeFormName').value.trim();
      if (!code || !name) { alert('请填写编码与名称'); return; }
      if (modalMode === 'edit' && editingRow) {
        editingRow.dataset.name = name;
        editingRow.dataset.status = document.getElementById('towerTypeFormStatus').value;
        editingRow.cells[1].textContent = name;
        renderStatus(editingRow, editingRow.dataset.status === '1');
        alert('已保存（原型）');
      } else {
        alert('将保存铁塔类型「' + code + ' / ' + name + '」');
      }
      closeModal();
    });
    getModal().addEventListener('click', function (e) { if (e.target === getModal()) closeModal(); });
    document.querySelector('tbody').addEventListener('click', function (e) {
      var row = e.target.closest('tr[data-code]');
      if (!row) return;
      if (e.target.closest('.btn-tt-detail')) openModal('detail', row);
      if (e.target.closest('.btn-tt-edit')) openModal('edit', row);
      if (e.target.closest('.btn-tt-toggle')) {
        var enabled = row.dataset.status !== '1';
        renderStatus(row, enabled);
        alert((enabled ? '已启用' : '已停用') + '：' + row.dataset.code);
      }
      if (e.target.closest('.btn-tt-delete')) {
        var label = (row.dataset.name || '') + '（' + (row.dataset.code || '') + '）';
        if (confirm('确定要删除「' + label + '」吗？删除后不可恢复。')) alert('已删除（原型）');
      }
    });
  });
})();
</script>
</body>
</html>
