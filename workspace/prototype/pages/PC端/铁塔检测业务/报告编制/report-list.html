<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告编制列表</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/pc-layout.css">
</head>
<body>
<div id="page-content">
  <div class="card">
    <div class="card-header">
      <div class="card-title">报告编制列表</div>
    </div>
    <div class="card-body">
      <div class="toolbar">
        <div class="toolbar-left">
          <input id="kw" class="form-input" placeholder="搜索铁塔编号/报告编号/检测人员/编制人">
          <select id="statusFilter" class="form-select">
            <option value="">全部报告状态</option>
            <option value="待编制">待编制</option>
            <option value="编制中">编制中</option>
            <option value="已编制">已编制（审核中）</option>
            <option value="已出报告">已出报告</option>
          </select>
          <select id="auditStatusFilter" class="form-select" title="审核状态">
            <option value="">全部审核状态</option>
            <option value="未涉及">未涉及</option>
            <option value="未提交">未提交</option>
            <option value="待审核">待审核</option>
            <option value="审核中">审核中</option>
            <option value="已通过">已通过</option>
            <option value="已驳回">已驳回</option>
          </select>
          <input id="startDate" type="date" class="form-input" title="检测开始日期">
          <input id="endDate" type="date" class="form-input" title="检测结束日期">
          <button class="btn btn-primary" id="btn-search"><i class="fa-solid fa-magnifying-glass"></i> 查询</button>
          <button class="btn btn-default" id="btn-reset">重置</button>
        </div>
      </div>

      <div class="pc-table-actions">
        <button class="btn btn-default" id="btn-batch-export"><i class="fa-solid fa-file-export"></i> 批量导出</button>
          <button class="btn btn-default" id="btn-batch-print"><i class="fa-solid fa-print"></i> 批量打印</button>
          <button class="btn btn-primary" id="btn-batch-audit" title="将所选「已编制」且处于审核中的记录批量审核通过为「已出报告」"><i class="fa-solid fa-check-double"></i> 批量审核通过</button>
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th><input id="check-all" type="checkbox" aria-label="全选"></th>
            <th>报告编号</th>
            <th>铁塔编号/名称</th>
            <th>检测类型</th>
            <th>合同编号</th>
            <th>现场检测人员</th>
            <th>提交/更新时间</th>
            <th>编制人</th>
            <th>报告状态</th>
            <th>审核状态</th>
            <th>审核节点</th>
            <th>审核人</th>
            <th>审核时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="report-tbody"></tbody>
      </table>

      <div class="pagination">
        <span id="page-total">共 0 条记录</span>
        <div class="pagination-btns">
          <button class="page-btn" id="page-prev"><i class="fa-solid fa-chevron-left"></i></button>
          <button class="page-btn active" id="page-current">1</button>
          <button class="page-btn" id="page-next"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div id="pcAuditModal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-5" style="background:rgba(0,0,0,.45);display:none" aria-hidden="true">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
      <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200">
        <h3 id="pcAuditModalTitle" class="font-semibold text-slate-800">审核</h3>
        <button type="button" id="pcAuditModalClose" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="p-4">
        <p id="pcAuditModalSub" class="text-sm text-slate-600 mb-3 leading-relaxed"></p>
        <label class="form-label">审核意见</label>
        <textarea id="pcAuditRemark" class="form-textarea w-full min-h-[72px] mt-1" placeholder="选填；驳回时建议填写原因"></textarea>
        <a href="#" id="pcAuditGoDetail" class="btn-text text-xs mt-2 hidden"><i class="fa-solid fa-arrow-up-right-from-square"></i> 进入报告详情审核</a>
      </div>
      <div class="flex justify-end gap-2 px-4 py-3 border-t border-slate-200">
        <button type="button" class="btn btn-default" id="pcAuditCancel">取消</button>
        <button type="button" class="btn btn-default" id="pcAuditReject" style="color:var(--danger)"><i class="fa-solid fa-xmark"></i> 驳回</button>
        <button type="button" class="btn btn-primary" id="pcAuditPass"><i class="fa-solid fa-check"></i> 通过</button>
      </div>
    </div>
  </div>
</div>
<script src="../../../../assets/shared-layout.js"></script>
<script src="../../../../assets/pc-audit-action.js"></script>
<script>window.__layoutConfig = {active:'report_generate', breadcrumb:['检测管理','报告编制','报告列表']};</script>
<script>
  (function () {
    const REPORT_KEY = 'tower_reports';
    const TASK_KEY = 'tower_tasks';
    const role = localStorage.getItem('tower_role') || 'admin';
    const pageSize = 8;
    let currentPage = 1;
    let allData = [];
    let filtered = [];

    const statusClass = {
      '待编制': 'bg-slate-100 text-slate-700',
      '编制中': 'bg-blue-100 text-blue-800',
      '已编制': 'bg-amber-100 text-amber-800',
      '已出报告': 'bg-green-100 text-green-800'
    };

    function nowText() {
      const d = new Date();
      const p = function (n) { return String(n).padStart(2, '0'); };
      return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
    }

    function saveReports(list) {
      localStorage.setItem(REPORT_KEY, JSON.stringify(list));
    }

    function loadTasks() {
      try {
        return JSON.parse(localStorage.getItem(TASK_KEY) || '[]');
      } catch (e) {
        return [];
      }
    }

    function saveTasks(tasks) {
      localStorage.setItem(TASK_KEY, JSON.stringify(tasks));
    }

    function syncTaskStatusByReport(report, targetStatus) {
      const tasks = loadTasks();
      const idx = tasks.findIndex(function (t) { return t.id === report.taskId; });
      if (idx < 0) return;
      tasks[idx].reportSyncNote = targetStatus;
      tasks[idx].updatedAt = nowText();
      saveTasks(tasks);
    }

    function deriveAuditFields(r) {
      if (r.auditStatus) return;
      if (r.status === '待编制') {
        r.auditStatus = '未涉及'; r.auditNode = '—'; r.auditor = '—'; r.auditAt = '—';
      } else if (r.status === '编制中') {
        r.auditStatus = '未提交'; r.auditNode = '未发起审核'; r.auditor = '—'; r.auditAt = '—';
      } else if (r.status === '已编制') {
        r.auditStatus = '审核中'; r.auditNode = r.auditStep || '待技术部门主管审核'; r.auditor = r.auditor || '—'; r.auditAt = r.auditAt || '—';
      } else if (r.status === '已出报告') {
        r.auditStatus = '已通过'; r.auditNode = r.auditStep || '已完成'; r.auditor = r.auditor || '—'; r.auditAt = r.auditAt || '—';
      }
    }

    function migrateReportRow(r) {
      var s = r.status;
      if (s === '草稿') { r.status = '编制中'; }
      else if (s === '待审核') { r.status = '已编制'; if (!r.auditStep) r.auditStep = '待技术部门主管审核'; }
      else if (s === '已通过') { r.status = '已出报告'; if (!r.auditStep) r.auditStep = '已完成'; }
      else if (s === '已驳回') { r.status = '编制中'; r.auditStatus = '已驳回'; }
      deriveAuditFields(r);
      if (r.compiler === undefined || r.compiler === null || String(r.compiler).trim() === '') {
        r.compiler = '—';
      }
      return r;
    }

    function compilerDisplay(r) {
      return (r.compiler != null && String(r.compiler).trim() !== '') ? String(r.compiler).trim() : '—';
    }

    function migrateAllReports(list) {
      var needSave = false;
      var next = list.map(function (r) {
        var old = r.status;
        migrateReportRow(r);
        if (r.status !== old) needSave = true;
        return r;
      });
      if (needSave) saveReports(next);
      return next;
    }

    function seedReports() {
      const raw = localStorage.getItem(REPORT_KEY);
      if (raw) return;
      const seed = [
        { id:'R1', reportNo:'BG202605001', towerCode:'TT-BJ-001', towerName:'滨江01#塔', inspectType:'安全性鉴定', contractNo:'HT2026-001', inspector:'李明', compiler:'—', submitTime:'2026-05-10 09:00', inspectDate:'2026-05-04', status:'待编制', taskId:'RW202605001', rejectReason:'', auditStep:'', auditStatus:'未涉及', auditNode:'—', auditor:'—', auditAt:'—', declareFailed:false, extraSign:false, sourceNote:'检毕自动生成' },
        { id:'R2', reportNo:'BG202605002', towerCode:'TT-BJ-002', towerName:'滨江02#塔', inspectType:'常规检测', contractNo:'HT2026-002', inspector:'王强', compiler:'—', submitTime:'2026-05-09 14:20', inspectDate:'2026-05-05', status:'待编制', taskId:'RW202605002', rejectReason:'', auditStep:'', auditStatus:'未涉及', auditNode:'—', auditor:'—', auditAt:'—', declareFailed:true, declareFailReason:'监管平台申报失败：签名证书过期', extraSign:false, sourceNote:'检毕自动生成' },
        { id:'R3', reportNo:'BG202605003', towerCode:'TT-XH-001', towerName:'西湖01#塔', inspectType:'可靠性鉴定', contractNo:'HT2026-003', inspector:'张华', compiler:'李明', submitTime:'2026-05-08 16:30', inspectDate:'2026-05-06', status:'编制中', taskId:'RW202605003', rejectReason:'', auditStep:'', auditStatus:'未提交', auditNode:'未发起审核', auditor:'—', auditAt:'—', declareFailed:false, extraSign:false, sourceNote:'检毕自动生成' },
        { id:'R4', reportNo:'BG202605004', towerCode:'TT-YH-001', towerName:'余杭01#塔', inspectType:'安全性鉴定', contractNo:'HT2026-004', inspector:'赵六', compiler:'王强', submitTime:'2026-05-08 18:00', inspectDate:'2026-05-07', status:'已编制', taskId:'RW202605004', rejectReason:'', auditStep:'待技术部门主管审核', auditStatus:'审核中', auditNode:'待技术部门主管审核', auditor:'—', auditAt:'—', declareFailed:false, extraSign:true, sourceNote:'检毕自动生成' },
        { id:'R5', reportNo:'BG202605005', towerCode:'TT-XS-002', towerName:'萧山02#塔', inspectType:'常规检测', contractNo:'HT2026-005', inspector:'李明', compiler:'张华', submitTime:'2026-05-07 11:00', inspectDate:'2026-05-06', status:'已出报告', taskId:'RW202605005', rejectReason:'', auditStep:'已完成', auditStatus:'已通过', auditNode:'已完成', auditor:'李娜', auditAt:'2026-05-08 09:40', declareFailed:false, extraSign:false, sourceNote:'检毕自动生成' }
      ];
      saveReports(seed);
    }

    function loadReports() {
      try {
        return JSON.parse(localStorage.getItem(REPORT_KEY) || '[]');
      } catch (e) {
        return [];
      }
    }

    function tagHtml(status) {
      return '<span class="inline-flex px-2 py-1 rounded text-xs font-medium ' + (statusClass[status] || statusClass['待编制']) + '">' + status + '</span>';
    }

    function auditStatusTag(status) {
      var map = {
        '未涉及': 'tag-gray', '未提交': 'tag-gray', '待审核': 'tag-orange',
        '审核中': 'tag-blue', '已通过': 'tag-green', '已驳回': 'tag-red'
      };
      var cls = map[status] || 'tag-gray';
      return '<span class="tag ' + cls + '" style="font-size:12px">' + (status || '—') + '</span>';
    }

    function statusExtraTag(r) {
      if (r.status === '待编制' && r.declareFailed) {
        return ' <span class="inline-flex px-2 py-0.5 rounded text-xs font-medium bg-red-50 text-red-700 border border-red-200">申报失败</span>';
      }
      if (r.status === '已编制' && r.extraSign) {
        return ' <span class="inline-flex px-2 py-0.5 rounded text-xs font-medium bg-violet-50 text-violet-700 border border-violet-200">加签</span>';
      }
      return '';
    }

    function render() {
      const tbody = document.getElementById('report-tbody');
      const total = filtered.length;
      const maxPage = Math.max(1, Math.ceil(total / pageSize));
      if (currentPage > maxPage) currentPage = maxPage;
      const start = (currentPage - 1) * pageSize;
      const pageRows = filtered.slice(start, start + pageSize);
      tbody.innerHTML = pageRows.map(function (r) {
        const detailBtn = '<a href="report-detail.html?reportId=' + encodeURIComponent(r.id) + '" class="btn btn-text">查看详情</a>';
        const editBtn = (r.status === '待编制' || r.status === '编制中')
          ? '<a href="report-edit.html?reportId=' + encodeURIComponent(r.id) + '" class="btn btn-text">' + (r.status === '待编制' ? '发起编制' : '编辑') + '</a>'
          : '';
        const exportBtn = r.status === '已出报告' ? '<button class="btn btn-text btn-export" data-id="' + r.id + '">导出PDF</button>' : '';
        const problemSetBtn = r.status === '已出报告' ? '<button type="button" class="btn btn-text btn-problem-set" data-id="' + r.id + '">问题集</button>' : '';
        const canAudit = r.auditStatus === '待审核' || r.auditStatus === '审核中';
        const auditBtn = canAudit
          ? '<button type="button" class="btn btn-text btn-pc-audit" data-audit-kind="report" style="color:var(--primary)" data-title="' + r.reportNo + ' / ' + r.towerName + '" data-node="' + (r.auditNode || '') + '" data-auditor-default="周敏" data-href="report-detail.html?reportId=' + encodeURIComponent(r.id) + '"><i class="fa-solid fa-clipboard-check"></i> 审核</button>'
          : '';
        const stCell = tagHtml(r.status) + statusExtraTag(r);
        return '<tr data-report-id="' + r.id + '">' +
          '<td><input type="checkbox" class="row-check" data-id="' + r.id + '"></td>' +
          '<td>' + r.reportNo + '</td>' +
          '<td>' + r.towerCode + ' / ' + r.towerName + '</td>' +
          '<td>' + r.inspectType + '</td>' +
          '<td>' + r.contractNo + '</td>' +
          '<td>' + r.inspector + '</td>' +
          '<td>' + r.submitTime + '</td>' +
          '<td>' + compilerDisplay(r) + '</td>' +
          '<td>' + stCell + '</td>' +
          '<td data-audit-col>' + auditStatusTag(r.auditStatus) + '</td>' +
          '<td data-audit-col style="font-size:12px;color:var(--text-2);max-width:140px;">' + (r.auditNode || '—') + '</td>' +
          '<td data-audit-col>' + (r.auditor || '—') + '</td>' +
          '<td data-audit-col style="font-size:12px;white-space:nowrap;">' + (r.auditAt || '—') + '</td>' +
          '<td class="col-action">' + auditBtn + detailBtn + editBtn + exportBtn + problemSetBtn + '</td>' +
          '</tr>';
      }).join('');

      document.getElementById('page-total').textContent = '共 ' + total + ' 条记录';
      document.getElementById('page-current').textContent = String(currentPage);
      document.getElementById('page-prev').disabled = currentPage <= 1;
      document.getElementById('page-next').disabled = currentPage >= maxPage;
      document.getElementById('check-all').checked = false;
    }

    function applyFilters() {
      const kw = (document.getElementById('kw').value || '').trim().toLowerCase();
      const status = (document.getElementById('statusFilter').value || '').trim();
      const auditStatus = (document.getElementById('auditStatusFilter').value || '').trim();
      const startDate = (document.getElementById('startDate').value || '').trim();
      const endDate = (document.getElementById('endDate').value || '').trim();
      filtered = allData.filter(function (r) {
        const matchesKw = !kw || [r.towerCode, r.reportNo, r.inspector, r.compiler].join('|').toLowerCase().indexOf(kw) > -1;
        const matchesStatus = !status || r.status === status;
        const matchesAudit = !auditStatus || r.auditStatus === auditStatus;
        const d = (r.inspectDate || '').trim();
        const matchesStart = !startDate || (d && d >= startDate);
        const matchesEnd = !endDate || (d && d <= endDate);
        return matchesKw && matchesStatus && matchesAudit && matchesStart && matchesEnd;
      });
      currentPage = 1;
      render();
    }

    function selectedIds() {
      return Array.from(document.querySelectorAll('.row-check:checked')).map(function (el) {
        return el.getAttribute('data-id');
      });
    }

    function batchExport() {
      const ids = selectedIds();
      if (!ids.length) return alert('请先选择报告');
      alert('已批量导出 ' + ids.length + ' 份报告');
    }

    function batchPrint() {
      const ids = selectedIds();
      if (!ids.length) return alert('请先选择报告');
      alert('已加入打印队列 ' + ids.length + ' 份报告');
    }

    function batchAudit() {
      const ids = selectedIds();
      if (!ids.length) return alert('请先选择报告');
      let changed = 0;
      allData = allData.map(function (r) {
        if (ids.indexOf(r.id) > -1 && r.status === '已编制') {
          changed += 1;
          r.status = '已出报告';
          r.auditStep = '已完成';
          r.auditStatus = '已通过';
          r.auditNode = '已完成';
          r.auditor = r.auditor && r.auditor !== '—' ? r.auditor : '合同部-批量审核';
          r.auditAt = nowText();
          r.submitTime = nowText();
          syncTaskStatusByReport(r, '报告已出具');
        }
        return r;
      });
      if (!changed) return alert('所选记录中没有「已编制」状态（仅审核中的报告可批量审核通过为已出报告）');
      saveReports(allData);
      applyFilters();
      alert('批量审核完成：已将 ' + changed + ' 条更新为「已出报告」');
    }

    function bindEvents() {
      document.getElementById('btn-search').addEventListener('click', applyFilters);
      document.getElementById('btn-reset').addEventListener('click', function () {
        document.getElementById('kw').value = '';
        document.getElementById('statusFilter').value = '';
        document.getElementById('auditStatusFilter').value = '';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        applyFilters();
      });
      document.getElementById('check-all').addEventListener('change', function (e) {
        document.querySelectorAll('.row-check').forEach(function (el) { el.checked = e.target.checked; });
      });
      document.getElementById('page-prev').addEventListener('click', function () { currentPage -= 1; render(); });
      document.getElementById('page-next').addEventListener('click', function () { currentPage += 1; render(); });
      document.getElementById('btn-batch-export').addEventListener('click', batchExport);
      document.getElementById('btn-batch-print').addEventListener('click', batchPrint);
      document.getElementById('btn-batch-audit').addEventListener('click', batchAudit);

      document.addEventListener('click', function (e) {
        const target = e.target;
        if (!(target instanceof Element)) return;
        const exportBtn = target.closest('.btn-export');
        const problemSetBtn = target.closest('.btn-problem-set');
        if (exportBtn) {
          alert('报告已导出 PDF');
        }
        if (problemSetBtn) {
          const id = problemSetBtn.getAttribute('data-id');
          const row = allData.find(function (r) { return r.id === id; });
          if (!row || row.status !== '已出报告') return;
          window.location.href = 'report-detail.html?reportId=' + encodeURIComponent(id);
        }
      });
    }

    function initRoleUi() {
      const canBatchAudit = role === 'admin' || role === 'contract';
      const auditBtn = document.getElementById('btn-batch-audit');
      if (!canBatchAudit) {
        auditBtn.disabled = true;
        auditBtn.title = '仅合同部/管理员可批量审核通过';
      }
    }

    seedReports();
    allData = migrateAllReports(loadReports());
    filtered = allData.slice();
    bindEvents();
    initRoleUi();
    render();
    if (window.initPcAuditModal) window.initPcAuditModal();
  })();
</script>
</body>
</html>
