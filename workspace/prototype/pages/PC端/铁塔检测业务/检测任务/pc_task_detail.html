<style>
  .detail-tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:16px; flex-wrap:wrap; }
  .detail-tabs button {
    padding:10px 18px; font-size:14px; border:none; background:transparent; color:var(--text-2);
    cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; font-family:inherit;
    display:inline-flex; align-items:center; gap:6px;
  }
  .detail-tabs button:hover { color:var(--primary); }
  .detail-tabs button.active { color:var(--primary); font-weight:600; border-bottom-color:var(--primary); }
  .detail-tabs .tab-badge {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:18px; height:18px; padding:0 6px; border-radius:9px;
    background:#FFECE8; color:#F53F3F; font-size:11px; font-weight:600; line-height:1;
  }
  .detail-tabs button.active .tab-badge { background:#E8F3FF; color:var(--primary); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }
  .kv-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px 20px; }
  .kv-grid.kv-3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
  @media (max-width:1100px) { .kv-grid.kv-3 { grid-template-columns:repeat(2,minmax(0,1fr)); } }
  .kv-item b { display:block;font-size:12px;color:var(--text-3);margin-bottom:4px;font-weight:500; }
  .kv-item span { color:var(--text-1);font-size:13px; }
  .log-type { display:inline-block; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:600; }
  .log-type--urge { background:#FFF7E8; color:#FF7D00; }
  .log-type--transfer { background:#E8F3FF; color:#165DFF; }
  .log-type--reject { background:#FFECE8; color:#F53F3F; }
  .empty-hint { font-size:13px; color:var(--text-3); margin:0; line-height:1.6; }
  .card + .card { margin-top: 14px; }
  .card-head-row { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  /* 检测数据内嵌区：直接平铺录入页 */
  #panel-data { margin: -4px -2px 0; }
  .data-embed-wrap {
    border:1px solid var(--border); border-radius:6px; overflow:hidden;
    background:#fff; height:calc(100vh - 220px); min-height:520px; display:flex; flex-direction:column;
  }
  .data-embed-frame { flex:1; width:100%; border:none; background:#fff; min-height:0; display:block; }
  .data-embed-empty {
    flex:1; display:flex; align-items:center; justify-content:center;
    padding:36px 20px; background:#fff; text-align:center;
  }
  .data-embed-empty .ee-inner { max-width:420px; color:var(--text-2); font-size:13px; line-height:1.7; }
  .data-embed-empty .ee-icon { font-size:32px; color:#C9CDD4; margin-bottom:12px; }
</style>
</head>

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/"/g, '&quot;');
  }

    if (type === '转派') return 'log-type log-type--transfer';
    if (type === '拒绝') return 'log-type log-type--reject';
    return 'log-type';
  }

      return '<div class="kv-item"><b>' + esc(r[0]) + '</b><span>' + esc(r[1]) + '</span></div>';
    }).join('');

      b.classList.toggle('active', b.getAttribute('data-tab') === tab);
    });
    document.querySelectorAll('.tab-panel').forEach(function (p) {
      p.classList.toggle('active', p.id === 'panel-' + tab);
    });
    if (tab === 'data') ensureDataEmbed();
  }

  document.querySelectorAll('.detail-tabs button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      activateTab(this.getAttribute('data-tab'));
    });
  });

  // URL ?tab=data 直达
  var urlTab = params.get('tab');
  if (urlTab && ['overview', 'data'].indexOf(urlTab) !== -1) {
    activateTab(urlTab);
  }
})();
</script>
</body>
</html>
