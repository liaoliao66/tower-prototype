<!DOCTYPE html>
<!-- iPad-TASK_INSPECT_HOME v3.0 landscape · 方案B 左菜单+右内嵌 -->
<html lang="zh-CN" class="ipad-task-html">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>检测填报</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<link rel="stylesheet" href="../../../../assets/ipad-task-shell.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<style>
.export-sheet-mask {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0, 0, 0, 0.45);
  align-items: center;
  justify-content: center;
  padding: 20px;
  box-sizing: border-box;
}
.export-sheet-mask.show { display: flex; }
.export-sheet {
  width: min(480px, 100%);
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  box-sizing: border-box;
  box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
}
.export-sheet-h {
  margin: 0 0 8px;
  text-align: center;
  font-size: 16px;
  font-weight: 600;
  color: #1d2129;
}
.export-sheet-sub {
  margin: 0 0 16px;
  text-align: center;
  font-size: 12px;
  color: #86909c;
  line-height: 1.45;
}
.export-sheet-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 16px;
  margin: 0 0 10px;
  border: none;
  border-radius: 8px;
  background: #f7f8fa;
  color: #1d2129;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.export-sheet-btn i { color: #165dff; }
.export-sheet-btn:active { background: #eef0f3; }
.export-sheet-cancel {
  display: block;
  width: 100%;
  padding: 12px;
  margin: 4px 0 0;
  border: none;
  background: transparent;
  color: #86909c;
  font-size: 15px;
  cursor: pointer;
  font-family: inherit;
}
</style>
</head>
<body class="ipad-adapt ipad-task-page ipad-task-split" data-ipad-tab-active="inspect">
<script>try{if(/\bembed=1\b/.test(location.search))document.documentElement.classList.add('task-embed');var _k='tower_app_active_inspect_order';var _sp=new URLSearchParams(location.search);var _oid=(_sp.get('order')||'').trim().toUpperCase();if(_oid)sessionStorage.setItem(_k,_oid);}catch(e){}</script>

<div class="header-fixed">
  <div class="status-bar" aria-hidden="true">
    <span class="status-time">9:41</span>
    <span class="status-icons" aria-hidden="true">
      <i class="fa-solid fa-signal"></i>
      <i class="fa-solid fa-wifi"></i>
      <i class="fa-solid fa-battery-full"></i>
    </span>
  </div>
  <div class="top">
    <div class="top-row">
      <a class="top-back" href="../../工作台/首页/ipad_workbench_index.html" aria-label="返回"><i class="fa-solid fa-chevron-left"></i></a>
      <h1 class="top-title" id="topTaskTitle">滨江基站01 · 单管</h1>
    </div>
    <div class="top-actions" role="toolbar" aria-label="任务操作">
      <div class="top-actions-left">
        <button type="button" class="top-act top-act-export" id="btnExportVoice" title="导出语音备忘或检测任务数据"><i class="fa-solid fa-file-export"></i> 导出</button>
        <button type="button" class="top-act top-act-photo" id="btnPhotoRecognize" title="本模块拍照识别"><i class="fa-solid fa-camera" aria-hidden="true"></i> 拍照识别</button>
      </div>
      <div class="top-actions-right">
        <button type="button" class="top-act top-act-save" id="btnSave">保存</button>
        <button type="button" class="top-act top-act-sync" id="btnSyncAll" hidden>
          <i class="fa-solid fa-cloud-arrow-up" aria-hidden="true"></i>一键同步
        </button>
      </div>
    </div>
  </div>
</div>

<main class="inspect-split-main" id="inspectSplitMain">
  <aside class="inspect-split-nav" aria-label="检测模块菜单">
    <div class="inspect-split-progress" aria-label="总进度">
      <div class="prog-h"><span>总进度</span><span id="progPctLabel">38%</span></div>
      <div class="prog-bar"><div class="prog-in" id="progBarIn"></div></div>
    </div>
    <nav class="inspect-mod-nav" id="inspectModNav" aria-label="模块列表"></nav>
  </aside>
  <section class="inspect-split-pane" aria-label="模块填报区">
    <header class="inspect-pane-head">
      <h2 id="paneModuleTitle">基础信息</h2>
    </header>
    <iframe id="moduleFrame" class="inspect-module-frame" title="当前检测模块" src="about:blank"></iframe>
    <a
      id="inspectMemoFab"
      class="inspect-memo-fab"
      href="../备忘录/ipad_task_memo.html"
      aria-label="本模块备忘录"
      title="本模块备忘录"
    ><i class="fa-solid fa-microphone" aria-hidden="true"></i></a>
  </section>
</main>

<div class="export-sheet-mask" id="exportSheetMask" role="dialog" aria-modal="true" aria-labelledby="exportSheetTitle">
  <div class="export-sheet" id="exportSheetPanel" role="document">
    <div class="export-sheet-h" id="exportSheetTitle">导出</div>
    <p class="export-sheet-sub">请选择要导出的内容</p>
    <button type="button" class="export-sheet-btn" id="exportOptVoice"><i class="fa-solid fa-microphone"></i> 导出语音备忘录</button>
    <button type="button" class="export-sheet-btn" id="exportOptTask"><i class="fa-solid fa-table-list"></i> 导出检测任务数据</button>
    <button type="button" class="export-sheet-cancel" id="exportSheetCancel">取消</button>
  </div>
</div>

<script>
(function () {
  var TITLES = {
    DD20260506001: '滨江基站01 · 单管',
    DD20260507002: '城西枢纽站 · 角钢',
    DD20260508004: '余杭南枢纽 · 四管',
    DD20260505003: '拱墅北环站 · 三管',
    DD20260504005: '西湖景区东 · 单管'
  };
  var KEY = 'tower_app_active_inspect_order';
  var oid = '';
  try { oid = (new URLSearchParams(location.search).get('order') || '').trim().toUpperCase(); } catch (e) {}
  if (!oid) { try { oid = (sessionStorage.getItem(KEY) || '').trim().toUpperCase(); } catch (e2) {} }
  if (!oid) oid = 'DD20260506001';
  var titleEl = document.getElementById('topTaskTitle');
  if (titleEl) titleEl.textContent = TITLES[oid] || TITLES.DD20260506001;

  var MODULES = [
    { group: '资料与照片', name: '基础信息', icon: 'fa-id-card', src: '../../检测/塔体/ipad_inspect_tower.html', done: true },
    { group: '资料与照片', name: '上传铁塔照片', icon: 'fa-camera-retro', src: '../../检测/塔体/ipad_inspect_tower_photos.html', done: false, noPhoto: true },
    { group: '检测大模块', name: '整体模块', icon: 'fa-ruler-combined', src: '../../检测/垂直度/ipad_inspect_vertical.html', done: false },
    { group: '检测大模块', name: '基础', icon: 'fa-monument', src: '../../检测/地基/ipad_inspect_foundation.html', done: true },
    { group: '检测大模块', name: '地锚', icon: 'fa-anchor', src: '../../检测/地基/ipad_inspect_foundation.html', done: false },
    { group: '检测大模块', name: '塔段', icon: 'fa-layer-group', src: '../../检测/分段/ipad_inspect_segment.html', done: false },
    { group: '检测大模块', name: '平台及设备', icon: 'fa-satellite-dish', src: '../../检测/平台/ipad_inspect_platform.html', done: false },
    { group: '检测大模块', name: '防腐层质量', icon: 'fa-paint-roller', src: '../../检测/防腐层/ipad_inspect_coating.html', done: false },
    { group: '检测大模块', name: '焊接', icon: 'fa-wrench', src: '../../检测/焊接/ipad_inspect_weld.html', done: false },
    { group: '检测大模块', name: '馈线门高度', icon: 'fa-door-open', src: '../../检测/馈线/ipad_inspect_feed.html', done: false },
    { group: '检测大模块', name: '馈线孔 / 爬梯 / 拉线', icon: 'fa-ruler-horizontal', src: '../../检测/馈线/ipad_inspect_feed.html', done: false },
    { group: '检测大模块', name: '连接质量', icon: 'fa-link', src: '../../检测/连接/ipad_inspect_connection.html', done: false },
    { group: '检测大模块', name: '构建质量与接地避雷', icon: 'fa-bolt', src: '../../检测/接地/ipad_inspect_ground.html', done: false },
    { group: '便捷与校验', name: '模块语音备忘', icon: 'fa-note-sticky', src: '../../检测/备注/ipad_inspect_note.html', done: false, id: 'note', noShellTools: true },
    { group: '便捷与校验', name: '校验与提交', icon: 'fa-check-double', src: '../../检测/校验/ipad_inspect_validate.html', done: false, id: 'validate' },
    { group: '便捷与校验', name: '同步队列', icon: 'fa-cloud-arrow-up', src: '../../系统/同步/ipad_sync_index.html', done: false, id: 'sync' }
  ];

  var navEl = document.getElementById('inspectModNav');
  var frame = document.getElementById('moduleFrame');
  var paneTitle = document.getElementById('paneModuleTitle');
  var btnSave = document.getElementById('btnSave');
  var btnSyncAll = document.getElementById('btnSyncAll');
  var btnPhotoRecognize = document.getElementById('btnPhotoRecognize');
  var memoFab = document.getElementById('inspectMemoFab');
  var activeIdx = 0;

  var MODULE_ID_BY_FILE = {
    'ipad_inspect_tower.html': 'tower',
    'ipad_inspect_tower_photos.html': 'tower_photos',
    'ipad_inspect_vertical.html': 'vertical',
    'ipad_inspect_foundation.html': 'foundation',
    'ipad_inspect_segment.html': 'segment',
    'ipad_inspect_platform.html': 'platform',
    'ipad_inspect_coating.html': 'coating',
    'ipad_inspect_weld.html': 'weld',
    'ipad_inspect_feed.html': 'feed',
    'ipad_inspect_connection.html': 'connection',
    'ipad_inspect_ground.html': 'ground',
    'ipad_inspect_note.html': 'note',
    'ipad_inspect_validate.html': 'validate',
    'ipad_sync_index.html': 'sync'
  };

  function moduleMeta(mod) {
    if (!mod) return null;
    var fn = (mod.src || '').split('/').pop() || '';
    return {
      id: mod.id || MODULE_ID_BY_FILE[fn] || fn.replace(/\.html$/i, ''),
      name: mod.name,
      noPhoto: !!(mod.noPhoto || mod.noShellTools || mod.id === 'sync' || mod.id === 'validate' || mod.id === 'note' || /tower_photos|inspect_note|ipad_sync/i.test(fn)),
      noShellTools: !!(mod.noShellTools || mod.id === 'sync' || mod.id === 'validate' || mod.id === 'note')
    };
  }

  function buildMemoHref(meta) {
    if (!meta || !memoFab) return '#';
    try {
      var u = new URL('../备忘录/ipad_task_memo.html', window.location.href);
      u.searchParams.set('scope', 'module');
      u.searchParams.set('moduleId', meta.id);
      u.searchParams.set('moduleName', meta.name);
      u.searchParams.set('return', window.location.href);
      if (oid) u.searchParams.set('order', oid);
      return u.pathname + u.search + u.hash;
    } catch (e) {
      return memoFab.getAttribute('href') || '#';
    }
  }
  var flatItems = [];

  function embedUrl(path) {
    try {
      var u = new URL(path, window.location.href);
      u.searchParams.set('embed', '1');
      if (oid) u.searchParams.set('order', oid);
      return u.pathname + u.search + u.hash;
    } catch (e) {
      return path + (path.indexOf('?') >= 0 ? '&' : '?') + 'embed=1';
    }
  }

  function buildNav() {
    if (!navEl) return;
    navEl.innerHTML = '';
    flatItems = [];
    var groups = {};
    MODULES.forEach(function (m, i) {
      if (!groups[m.group]) groups[m.group] = [];
      groups[m.group].push({ mod: m, index: i });
    });
    Object.keys(groups).forEach(function (groupName) {
      var section = document.createElement('div');
      section.className = 'inspect-mod-group';
      var gt = document.createElement('span');
      gt.className = 'inspect-mod-group-title';
      gt.textContent = groupName;
      section.appendChild(gt);
      groups[groupName].forEach(function (entry) {
        var m = entry.mod;
        var idx = entry.index;
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'inspect-mod-item' + (m.done ? ' is-done' : '');
        btn.setAttribute('data-idx', String(idx));
        btn.innerHTML =
          '<span class="mod-ic"><i class="fa-solid ' + m.icon + '" aria-hidden="true"></i></span>' +
          '<span class="mod-txt"><span class="mod-name">' + m.name + '</span></span>' +
          (m.done ? '<span class="mod-badge">100%</span>' : '');
        btn.addEventListener('click', function () { selectModule(idx); });
        section.appendChild(btn);
        flatItems.push(btn);
      });
      navEl.appendChild(section);
    });
  }

  function isSyncModule(mod) {
    return !!(mod && (mod.id === 'sync' || /ipad_sync_index/i.test(mod.src || '')));
  }

  function isValidateModule(mod) {
    return !!(mod && (mod.id === 'validate' || /ipad_inspect_validate/i.test(mod.src || '')));
  }

  function updateHeaderActions(mod) {
    var syncMode = isSyncModule(mod);
    var validateMode = isValidateModule(mod);
    var hideDefaultActs = syncMode || validateMode;
    var meta = moduleMeta(mod);
    var hideShellTools = !!(meta && meta.noShellTools);
    document.body.classList.toggle('ipad-sync-module-active', syncMode);
    document.body.classList.toggle('ipad-validate-module-active', validateMode);
    document.body.classList.toggle('ipad-inspect-shell-tools-hidden', hideShellTools);
    if (btnSave) btnSave.hidden = hideDefaultActs;
    if (btnSyncAll) btnSyncAll.hidden = !syncMode;
    if (btnPhotoRecognize) btnPhotoRecognize.hidden = hideShellTools || !!(meta && meta.noPhoto);
    if (memoFab && meta) memoFab.href = buildMemoHref(meta);
  }

  function selectModule(idx) {
    if (idx < 0 || idx >= MODULES.length) return;
    activeIdx = idx;
    var m = MODULES[idx];
    flatItems.forEach(function (btn, i) {
      var itemIdx = parseInt(btn.getAttribute('data-idx'), 10);
      btn.classList.toggle('is-active', itemIdx === idx);
    });
    if (paneTitle) paneTitle.textContent = m.name;
    updateHeaderActions(m);
    if (frame) {
      frame.src = embedUrl(m.src);
    }
    var activeBtn = flatItems.filter(function (b) { return parseInt(b.getAttribute('data-idx'), 10) === idx; })[0];
    if (activeBtn && typeof activeBtn.scrollIntoView === 'function') {
      activeBtn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  buildNav();
  selectModule(0);

  var exportMask = document.getElementById('exportSheetMask');
  function openExportSheet() {
    exportMask.classList.add('show');
    document.body.style.overflow = 'hidden';
  }
  function closeExportSheet() {
    exportMask.classList.remove('show');
    document.body.style.overflow = '';
  }
  document.getElementById('btnExportVoice').addEventListener('click', openExportSheet);
  exportMask.addEventListener('click', function (e) {
    if (e.target === exportMask) closeExportSheet();
  });
  document.getElementById('exportSheetCancel').addEventListener('click', closeExportSheet);
  document.getElementById('exportOptVoice').addEventListener('click', function () {
    closeExportSheet();
    alert('正在导出语音备忘录：已合并任务整体备忘与各检测大模块语音备份录及转写，生成 Word 并唤起系统分享。');
  });
  document.getElementById('exportOptTask').addEventListener('click', function () {
    closeExportSheet();
    alert('正在导出检测任务数据：将打包当前任务各模块已填字段、附件清单与校验状态，生成 Excel（多工作表）并唤起系统分享。');
  });
  if (btnSave) {
    btnSave.addEventListener('click', function () {
      alert('已保存当前任务全部模块数据');
    });
  }
  if (btnSyncAll) {
    btnSyncAll.addEventListener('click', function () {
      alert('开始同步待上传数据（原型演示）。');
    });
  }
  if (btnPhotoRecognize) {
    btnPhotoRecognize.addEventListener('click', function () {
      var m = MODULES[activeIdx];
      var meta = moduleMeta(m);
      if (!meta) return;
      alert(
        '拍照：上传或拍摄照片 → OCR 映射到可填字段草稿 → 须人工确认后落库（与填报主页一致）。\n\n' +
          '当前作用域：「' +
          meta.name +
          '」模块，仅识别并预填本页模板字段，不影响其它模块。'
      );
    });
  }

  (function initMemoFabDrag() {
    if (!memoFab) return;
    var pane = memoFab.closest('.inspect-split-pane');
    if (!pane) return;
    var STORAGE_KEY = 'tower_ipad_inspect_memo_fab_pos';
    var DRAG_THRESHOLD = 6;
    var dragging = false;
    var moved = false;
    var startX = 0;
    var startY = 0;
    var startLeft = 0;
    var startTop = 0;

    function clamp(n, min, max) {
      return Math.min(max, Math.max(min, n));
    }

    function fabSize() {
      var r = memoFab.getBoundingClientRect();
      return { w: r.width || 52, h: r.height || 52 };
    }

    function applyPos(left, top) {
      var pr = pane.getBoundingClientRect();
      var sz = fabSize();
      var maxL = Math.max(8, pr.width - sz.w - 8);
      var maxT = Math.max(8, pr.height - sz.h - 8);
      var l = clamp(left, 8, maxL);
      var t = clamp(top, 8, maxT);
      memoFab.style.left = l + 'px';
      memoFab.style.top = t + 'px';
      memoFab.style.right = 'auto';
      memoFab.style.bottom = 'auto';
      return { left: l, top: t };
    }

    function defaultPos() {
      var pr = pane.getBoundingClientRect();
      var sz = fabSize();
      return {
        left: pr.width - sz.w - 20,
        top: pr.height - sz.h - 20
      };
    }

    function restorePos() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) {
          applyPos(defaultPos().left, defaultPos().top);
          return;
        }
        var p = JSON.parse(raw);
        if (typeof p.left === 'number' && typeof p.top === 'number') {
          applyPos(p.left, p.top);
          return;
        }
      } catch (e) {}
      applyPos(defaultPos().left, defaultPos().top);
    }

    function savePos() {
      try {
        var l = parseFloat(memoFab.style.left);
        var t = parseFloat(memoFab.style.top);
        if (!isFinite(l) || !isFinite(t)) return;
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ left: l, top: t }));
      } catch (e2) {}
    }

    restorePos();
    window.addEventListener('resize', function () {
      var l = parseFloat(memoFab.style.left);
      var t = parseFloat(memoFab.style.top);
      if (!isFinite(l) || !isFinite(t)) restorePos();
      else applyPos(l, t);
    });

    memoFab.addEventListener('click', function (e) {
      if (moved) {
        e.preventDefault();
        moved = false;
      }
    });

    memoFab.addEventListener('pointerdown', function (e) {
      if (e.button !== undefined && e.button !== 0) return;
      dragging = true;
      moved = false;
      document.body.classList.add('ipad-inspect-fab-dragging');
      var fr = memoFab.getBoundingClientRect();
      var pr = pane.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      startLeft = fr.left - pr.left;
      startTop = fr.top - pr.top;
      try {
        memoFab.setPointerCapture(e.pointerId);
      } catch (cap) {}
      e.preventDefault();
    });

    memoFab.addEventListener('pointermove', function (e) {
      if (!dragging) return;
      var dx = e.clientX - startX;
      var dy = e.clientY - startY;
      if (!moved && (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD)) moved = true;
      if (moved) applyPos(startLeft + dx, startTop + dy);
    });

    function endDrag(e) {
      if (!dragging) return;
      dragging = false;
      document.body.classList.remove('ipad-inspect-fab-dragging');
      try {
        memoFab.releasePointerCapture(e.pointerId);
      } catch (rel) {}
      if (moved) savePos();
    }

    memoFab.addEventListener('pointerup', endDrag);
    memoFab.addEventListener('pointercancel', endDrag);
  })();
})();
</script>
</body>
</html>
