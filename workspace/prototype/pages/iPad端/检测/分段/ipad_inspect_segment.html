<!DOCTYPE html>
<!-- iPad-INSPECT_SEGMENT v2.1 landscape -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>塔段检测</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/app-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-basic.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
</head>
<body class="inspect-app-layout ipad-adapt">
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div id="appNavBar">
  <a href="../../任务/填报主页/ipad_task_inspect_home.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">塔段检测</span>
  <span style="width:40px;"></span>
</div>

<div id="appSegmentTabBar" class="seg-tab-bar">
  <div id="segTabScroll" class="seg-tab-scroll" role="tablist" aria-label="塔段选择"></div>
  <button type="button" id="btnAddSegment" class="seg-tab-add" aria-label="添加塔段" title="添加塔段">
    <i class="fa-solid fa-plus" aria-hidden="true"></i>
  </button>
</div>

<div id="appEmbedContent" class="segment-page">
  <div class="inspect-banner" role="status">
    <i class="fa-solid fa-layer-group" aria-hidden="true"></i>
    <span id="segProgressText">共 5 段 · 当前第 1 段 · 按检测模板逐段填报</span>
  </div>
  <div id="segmentFormHost"></div>
</div>

<div id="segDeleteMask" class="seg-del-mask" role="dialog" aria-modal="true" aria-labelledby="segDelTitle">
  <div class="seg-del-dialog">
    <h3 id="segDelTitle">删除塔段</h3>
    <p id="segDelMsg">确定删除该塔段？删除后已填数据将无法恢复。</p>
    <div class="seg-del-actions">
      <button type="button" class="seg-del-cancel" id="segDelCancel">取消</button>
      <button type="button" class="seg-del-ok" id="segDelOk">删除</button>
    </div>
  </div>
</div>

<script>
(function () {
  var MAX_SEGMENTS = 20;
  var pendingDeleteIndex = -1;

  function defaultSegment(i) {
    return {
      thickness: i === 0 ? '8.5' : i === 1 ? '8.2' : '',
      corrosion: i === 0 ? '轻微锈蚀' : i === 2 ? '中度锈蚀' : '无锈蚀',
      flangeGap: i === 0 ? '0.5' : '',
      boltLoose: i === 2,
      resultPass: i !== 2,
      remark: i === 0 ? '第1段整体状况良好，轻微表面锈蚀。' : ''
    };
  }

  var segments = [0, 1, 2, 3, 4].map(function (i) { return defaultSegment(i); });
  var activeIndex = 0;

  var tabScroll = document.getElementById('segTabScroll');
  var formHost = document.getElementById('segmentFormHost');
  var delMask = document.getElementById('segDeleteMask');
  var delMsg = document.getElementById('segDelMsg');
  var progressText = document.getElementById('segProgressText');

  function segmentLabel(i) {
    return '第' + (i + 1) + '段';
  }

  function escapeAttr(v) {
    return String(v == null ? '' : v).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
  }

  function escapeHtml(v) {
    return String(v == null ? '' : v).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function optionHtml(label, selected) {
    var sel = label === selected ? ' selected' : '';
    return '<option' + sel + '>' + escapeHtml(label) + '</option>';
  }

  function updateProgress() {
    if (progressText) {
      progressText.textContent =
        '共 ' + segments.length + ' 段 · 当前' + segmentLabel(activeIndex) + ' · 按检测模板逐段填报';
    }
  }

  function readFormIntoSegment() {
    var s = segments[activeIndex];
    if (!s) return;
    var t = formHost.querySelector('[data-f="thickness"]');
    var c = formHost.querySelector('[data-f="corrosion"]');
    var f = formHost.querySelector('[data-f="flangeGap"]');
    var r = formHost.querySelector('[data-f="remark"]');
    if (t) s.thickness = t.value;
    if (c) s.corrosion = c.value;
    if (f) s.flangeGap = f.value;
    if (r) s.remark = r.value;
    var bolt = formHost.querySelector('[data-f="boltLoose"]');
    s.boltLoose = bolt && bolt.getAttribute('data-val') === '1';
    var res = formHost.querySelector('[data-f="resultPass"]');
    s.resultPass = !(res && res.getAttribute('data-val') === '0');
  }

  function bindToggles(root) {
    root.querySelectorAll('[data-toggle]').forEach(function (group) {
      var field = group.getAttribute('data-toggle');
      group.querySelectorAll('.toggle-opt').forEach(function (opt) {
        opt.addEventListener('click', function (e) {
          e.stopPropagation();
          var val = opt.getAttribute('data-val');
          group.querySelectorAll('.toggle-opt').forEach(function (o) {
            o.classList.remove('on-pass', 'on-fail');
          });
          group.setAttribute('data-val', val);
          if (field === 'boltLoose') {
            if (val === '0') opt.classList.add('on-pass');
            else opt.classList.add('on-fail');
          } else {
            if (val === '1') opt.classList.add('on-pass');
            else opt.classList.add('on-fail');
          }
        });
      });
    });
    root.querySelectorAll('.photo-thumb-add').forEach(function (el) {
      el.addEventListener('click', function () {
        alert('拍照：记录' + segmentLabel(activeIndex) + '现场照片（原型演示）。');
      });
    });
  }

  function renderForm() {
    var s = segments[activeIndex];
    if (!s) return;
    var title = segmentLabel(activeIndex) + ' · 检测数据';
    var bolt0 = s.boltLoose ? '' : ' on-pass';
    var bolt1 = s.boltLoose ? ' on-fail' : '';
    var res1 = s.resultPass ? ' on-pass' : '';
    var res0 = s.resultPass ? '' : ' on-fail';
    var parts = [];
    parts.push('<section class="seg-form-card" aria-labelledby="segFormTitle">');
    parts.push('<h3 id="segFormTitle" class="seg-form-title">', escapeHtml(title), '</h3>');
    parts.push('<div class="basic-grid-2">');
    parts.push('<div class="basic-field"><label class="basic-label"><i class="fa-solid fa-ruler" aria-hidden="true"></i>壁厚（mm）</label>');
    parts.push('<input type="number" class="form-input" data-f="thickness" value="', escapeAttr(s.thickness), '" placeholder="请输入壁厚"></div>');
    parts.push('<div class="basic-field"><label class="basic-label"><i class="fa-solid fa-droplet" aria-hidden="true"></i>锈蚀程度</label>');
    parts.push('<select class="form-input" data-f="corrosion">', optionHtml('无锈蚀', s.corrosion), optionHtml('轻微锈蚀', s.corrosion), optionHtml('中度锈蚀', s.corrosion), optionHtml('严重锈蚀', s.corrosion), '</select></div>');
    parts.push('</div><div class="basic-grid-2">');
    parts.push('<div class="basic-field"><label class="basic-label"><i class="fa-solid fa-ruler-horizontal" aria-hidden="true"></i>法兰间隙（mm）</label>');
    parts.push('<input type="number" class="form-input" data-f="flangeGap" value="', escapeAttr(s.flangeGap), '" placeholder="请输入法兰间隙"></div>');
    parts.push('<div class="basic-field"><label class="basic-label"><i class="fa-solid fa-screwdriver-wrench" aria-hidden="true"></i>螺栓松动</label>');
    parts.push('<div class="toggle-pair" data-toggle="boltLoose" data-f="boltLoose" data-val="', s.boltLoose ? '1' : '0', '">');
    parts.push('<div class="toggle-opt', bolt0, '" data-val="0">无松动</div><div class="toggle-opt', bolt1, '" data-val="1">有松动</div></div></div></div>');
    parts.push('<div class="basic-field"><label class="basic-label"><i class="fa-solid fa-circle-check" aria-hidden="true"></i>检测结果</label>');
    parts.push('<div class="toggle-pair" data-toggle="resultPass" data-f="resultPass" data-val="', s.resultPass ? '1' : '0', '">');
    parts.push('<div class="toggle-opt', res1, '" data-val="1">合格</div><div class="toggle-opt', res0, '" data-val="0">不合格</div></div></div>');
    parts.push('<div class="basic-field"><label class="basic-label"><i class="fa-solid fa-camera" aria-hidden="true"></i>拍照记录</label>');
    parts.push('<div class="photo-thumb-add" role="button" tabindex="0"><i class="fa-solid fa-camera" aria-hidden="true"></i><span>拍照</span></div></div>');
    parts.push('<div class="basic-field"><label class="basic-label"><i class="fa-solid fa-pen" aria-hidden="true"></i>备注</label>');
    parts.push('<textarea class="form-textarea" data-f="remark" placeholder="请输入备注信息">', escapeHtml(s.remark), '</textarea></div>');
    parts.push('</section>');
    formHost.innerHTML = parts.join('');
    bindToggles(formHost);
    updateProgress();
  }

  function renderTabs() {
    tabScroll.innerHTML = '';
    segments.forEach(function (_, i) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'seg-tab-item' + (i === activeIndex ? ' active' : '');
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', i === activeIndex ? 'true' : 'false');
      btn.setAttribute('data-index', String(i));
      var label = document.createElement('span');
      label.textContent = segmentLabel(i);
      btn.appendChild(label);
      if (segments.length > 1) {
        var del = document.createElement('button');
        del.type = 'button';
        del.className = 'seg-tab-del';
        del.setAttribute('aria-label', '删除' + segmentLabel(i));
        del.innerHTML = '<i class="fa-solid fa-xmark" aria-hidden="true"></i>';
        del.addEventListener('click', function (e) {
          e.stopPropagation();
          openDeleteConfirm(i);
        });
        btn.appendChild(del);
      }
      btn.addEventListener('click', function () {
        if (activeIndex === i) return;
        readFormIntoSegment();
        activeIndex = i;
        renderTabs();
        renderForm();
        scrollTabIntoView(i);
      });
      tabScroll.appendChild(btn);
    });
    var addBtn = document.getElementById('btnAddSegment');
    addBtn.disabled = segments.length >= MAX_SEGMENTS;
    addBtn.style.opacity = segments.length >= MAX_SEGMENTS ? '0.45' : '1';
    updateProgress();
  }

  function scrollTabIntoView(i) {
    var tab = tabScroll.querySelector('[data-index="' + i + '"]');
    if (tab && tab.scrollIntoView) {
      tab.scrollIntoView({ behavior: 'smooth', inline: 'nearest', block: 'nearest' });
    }
  }

  function openDeleteConfirm(i) {
    pendingDeleteIndex = i;
    delMsg.textContent = '确定删除「' + segmentLabel(i) + '」？删除后该段已填数据将无法恢复。';
    delMask.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeDeleteConfirm() {
    delMask.classList.remove('show');
    document.body.style.overflow = '';
    pendingDeleteIndex = -1;
  }

  function deleteSegment(i) {
    if (segments.length <= 1 || i < 0 || i >= segments.length) return;
    readFormIntoSegment();
    segments.splice(i, 1);
    if (activeIndex === i) {
      activeIndex = Math.min(i, segments.length - 1);
    } else if (activeIndex > i) {
      activeIndex--;
    }
    renderTabs();
    renderForm();
    scrollTabIntoView(activeIndex);
  }

  function addSegment() {
    if (segments.length >= MAX_SEGMENTS) return;
    readFormIntoSegment();
    segments.push(defaultSegment(segments.length));
    activeIndex = segments.length - 1;
    renderTabs();
    renderForm();
    scrollTabIntoView(activeIndex);
  }

  document.getElementById('btnAddSegment').addEventListener('click', addSegment);
  document.getElementById('segDelCancel').addEventListener('click', closeDeleteConfirm);
  document.getElementById('segDelOk').addEventListener('click', function () {
    var i = pendingDeleteIndex;
    closeDeleteConfirm();
    deleteSegment(i);
  });
  delMask.addEventListener('click', function (e) {
    if (e.target === delMask) closeDeleteConfirm();
  });
  renderTabs();
  renderForm();
})();
</script>
</body>
</html>
