<!DOCTYPE html>
<!-- iPad-INSPECT_VERTICAL v2.0 landscape -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>垂直度</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/app-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #F2F3F5; margin: 0; }
.form-label { font-size:13px; color:#86909C; margin-bottom:6px; display:block; }
.form-input { width:100%; height:44px; border:1px solid #E5E6EB; border-radius:12px; padding:0 14px; font-size:15px; outline:none; box-sizing:border-box; background:#fff; }
</style>
</head>
<body class="inspect-app-layout inspect-embed-pad-116 ipad-adapt">
<!-- Status bar -->
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<!-- Navigation bar -->
<div id="appNavBar">
  <a href="../../任务/填报主页/ipad_task_inspect_home.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">垂直度</span>
  <span style="width:40px;"></span>
</div>

<!-- Content area -->
<div id="appEmbedContent">

  <!-- 测量设置 -->
  <div style="background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
    <div style="font-size:15px; font-weight:600; color:#1D2129; margin-bottom:14px;">测量设置</div>
    <div style="margin-bottom:14px;">
      <label class="form-label">测量仪器</label>
      <select class="form-input" style="appearance:auto;">
        <option selected>徕卡TS06全站仪</option>
        <option>拓普康GTS-332N全站仪</option>
        <option>南方NTS-362R全站仪</option>
      </select>
    </div>
    <div>
      <label class="form-label">测量方法</label>
      <select class="form-input" style="appearance:auto;">
        <option>经纬仪</option>
        <option selected>全站仪</option>
      </select>
    </div>
  </div>

  <!-- 测量数据 -->
  <div style="background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
    <div style="font-size:15px; font-weight:600; color:#1D2129; margin-bottom:14px;">测量数据</div>

    <div style="display:flex; gap:12px; margin-bottom:14px;">
      <div style="flex:1;">
        <label class="form-label">塔顶偏移量X（mm）</label>
        <input type="number" class="form-input" value="35">
      </div>
      <div style="flex:1;">
        <label class="form-label">塔顶偏移量Y（mm）</label>
        <input type="number" class="form-input" value="28">
      </div>
    </div>

    <div style="display:flex; gap:12px; margin-bottom:14px;">
      <div style="flex:1;">
        <label class="form-label">塔高（m）</label>
        <div style="height:44px; background:#F7F8FA; border-radius:12px; display:flex; align-items:center; padding:0 14px; font-size:15px; color:#1D2129;">45.0</div>
      </div>
      <div style="flex:1;">
        <label class="form-label">倾斜率</label>
        <div style="height:44px; background:#F7F8FA; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; color:#165DFF;">0.10%</div>
      </div>
    </div>

    <div>
      <label class="form-label">是否合格</label>
      <div style="height:44px; background:#E8FFEA; border:1px solid #00B42A; border-radius:12px; display:flex; align-items:center; justify-content:center; gap:6px;">
        <i class="fa-solid fa-circle-check" style="color:#00B42A;"></i>
        <span style="font-size:15px; font-weight:600; color:#00B42A;">合格</span>
      </div>
    </div>
  </div>

</div>

<!-- Bottom button -->
<div class="ipad-flow-footer" data-app-flow-footer style="position:fixed; bottom:0; left:0; right:0; padding:12px 16px; background:#fff; border-top:1px solid #E5E6EB;">
  <a href="../../检测/校验/ipad_inspect_validate.html" style="display:block; width:100%; height:44px; background:#165DFF; color:#fff; border-radius:8px; font-size:16px; font-weight:600; text-decoration:none; text-align:center; line-height:44px; box-sizing:border-box;">完成检测</a>
</div>
</body>
</html>
