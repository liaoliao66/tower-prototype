<!DOCTYPE html>
<!-- iPad-INSPECT_VERTICAL v2.1 landscape -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>垂直度</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/app-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-basic.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
</head>
<body class="inspect-app-layout ipad-adapt">
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div id="appNavBar">
  <a href="../../任务/填报主页/ipad_task_inspect_home.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">垂直度</span>
  <span style="width:40px;"></span>
</div>

<div id="appEmbedContent" class="inspect-form-stack">

  <section class="basic-card" aria-labelledby="verticalSettingsTitle">
    <h3 id="verticalSettingsTitle" class="basic-card-title">测量设置</h3>
    <div class="basic-field">
      <label class="basic-label" for="instrumentSelect"><i class="fa-solid fa-sliders" aria-hidden="true"></i>测量仪器</label>
      <select id="instrumentSelect" class="form-input">
        <option selected>徕卡TS06全站仪</option>
        <option>拓普康GTS-332N全站仪</option>
        <option>南方NTS-362R全站仪</option>
      </select>
    </div>
    <div class="basic-field">
      <label class="basic-label" for="methodSelect"><i class="fa-solid fa-compass" aria-hidden="true"></i>测量方法</label>
      <select id="methodSelect" class="form-input">
        <option>经纬仪</option>
        <option selected>全站仪</option>
      </select>
    </div>
  </section>

  <section class="basic-card" aria-labelledby="verticalDataTitle">
    <h3 id="verticalDataTitle" class="basic-card-title">测量数据</h3>
    <div class="basic-grid-2">
      <div class="basic-field">
        <label class="basic-label" for="offsetX"><i class="fa-solid fa-ruler-horizontal" aria-hidden="true"></i>塔顶偏移量 X（mm）</label>
        <input id="offsetX" type="number" class="form-input" value="35">
      </div>
      <div class="basic-field">
        <label class="basic-label" for="offsetY"><i class="fa-solid fa-ruler-horizontal" aria-hidden="true"></i>塔顶偏移量 Y（mm）</label>
        <input id="offsetY" type="number" class="form-input" value="28">
      </div>
    </div>
    <div class="basic-grid-2">
      <div class="basic-field">
        <label class="basic-label" for="towerHeight"><i class="fa-solid fa-ruler-vertical" aria-hidden="true"></i>塔高（m）</label>
        <div id="towerHeight" class="form-readonly">45.0</div>
      </div>
      <div class="basic-field">
        <label class="basic-label" for="tiltRate"><i class="fa-solid fa-percent" aria-hidden="true"></i>倾斜率</label>
        <div id="tiltRate" class="form-readonly highlight">0.10%</div>
      </div>
    </div>
    <div class="basic-field">
      <label class="basic-label"><i class="fa-solid fa-circle-check" aria-hidden="true"></i>是否合格</label>
      <div class="status-pass"><i class="fa-solid fa-circle-check" aria-hidden="true"></i><span>合格</span></div>
    </div>
  </section>

</div>

</body>
</html>
