<!DOCTYPE html>
<!-- iPad-INSPECT_WELD v2.1 landscape -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>焊接检测</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/app-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-basic.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
</head>
<body class="inspect-app-layout ipad-adapt">
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div id="appNavBar">
  <a href="../../任务/填报主页/ipad_task_inspect_home.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">焊接检测</span>
  <span style="width:40px;"></span>
</div>

<div id="appEmbedContent" class="inspect-form-stack">

  <div class="inspect-banner" role="status">
    <i class="fa-solid fa-clipboard-check" aria-hidden="true"></i>
    <span>焊缝抽检记录表 · 已完成 2/3 项</span>
  </div>

  <section class="basic-card weld-check-card">
    <h3 class="basic-card-title">1. 法兰对接焊缝</h3>
    <div class="basic-field">
      <label class="basic-label">检测结果</label>
      <div class="toggle-pair" data-weld-toggle="1" data-val="1">
        <button type="button" class="toggle-opt on-pass" data-val="1">合格</button>
        <button type="button" class="toggle-opt" data-val="0">不合格</button>
      </div>
    </div>
    <div class="basic-field">
      <label class="basic-label" for="weldRemark1">备注</label>
      <input id="weldRemark1" type="text" class="form-input" placeholder="备注（选填）">
    </div>
  </section>

  <section class="basic-card weld-check-card weld-check-fail">
    <h3 class="basic-card-title">2. 加劲板角焊缝</h3>
    <div class="basic-field">
      <label class="basic-label">检测结果</label>
      <div class="toggle-pair" data-weld-toggle="2" data-val="0">
        <button type="button" class="toggle-opt" data-val="1">合格</button>
        <button type="button" class="toggle-opt on-fail" data-val="0">不合格</button>
      </div>
    </div>
    <div class="basic-field">
      <label class="basic-label" for="weldRemark2">备注</label>
      <input id="weldRemark2" type="text" class="form-input" value="东侧角焊缝咬边约 1mm，需返修">
    </div>
    <div class="basic-field">
      <label class="basic-label"><i class="fa-solid fa-camera" aria-hidden="true"></i>不合格拍照</label>
      <div class="photo-row">
        <div class="photo-thumb-add" role="button" tabindex="0" data-weld-photo>
          <i class="fa-solid fa-camera" aria-hidden="true"></i>
          <span>拍照</span>
        </div>
        <div class="photo-thumb-done" aria-hidden="true">
          <i class="fa-solid fa-image"></i>
          <span>角焊缝</span>
        </div>
      </div>
    </div>
  </section>

  <section class="basic-card weld-check-card">
    <h3 class="basic-card-title">3. 横隔板对接焊缝</h3>
    <div class="basic-field">
      <label class="basic-label">检测结果</label>
      <div class="toggle-pair" data-weld-toggle="3" data-val="1">
        <button type="button" class="toggle-opt on-pass" data-val="1">合格</button>
        <button type="button" class="toggle-opt" data-val="0">不合格</button>
      </div>
    </div>
    <div class="basic-field">
      <label class="basic-label" for="weldRemark3">备注</label>
      <input id="weldRemark3" type="text" class="form-input" placeholder="备注（选填）">
    </div>
  </section>

</div>

<div class="ipad-flow-footer flow-footer-split" data-app-flow-footer data-inspect-module-actions="1">
  <a href="../../任务/备忘录/ipad_task_memo.html" class="btn-memo"><i class="fa-solid fa-microphone" aria-hidden="true"></i> 备忘录</a>
  <button type="button" class="btn-photo" id="btnWeldPhoto"><i class="fa-solid fa-camera" aria-hidden="true"></i> 拍照</button>
  <a href="../../检测/馈线/ipad_inspect_feed.html" class="btn-primary">下一步</a>
</div>

<script>
(function () {
  document.querySelectorAll('[data-weld-toggle]').forEach(function (toggle) {
    toggle.querySelectorAll('.toggle-opt').forEach(function (opt) {
      opt.addEventListener('click', function () {
        var val = opt.getAttribute('data-val');
        toggle.setAttribute('data-val', val);
        toggle.querySelectorAll('.toggle-opt').forEach(function (o) {
          o.classList.remove('on-pass', 'on-fail');
        });
        if (val === '1') opt.classList.add('on-pass');
        else opt.classList.add('on-fail');
        var card = toggle.closest('.weld-check-card');
        if (card) card.classList.toggle('weld-check-fail', val === '0');
      });
    });
  });

  function openPhoto() {
    alert('拍照：记录焊缝现场照片（原型演示）。');
  }
  document.getElementById('btnWeldPhoto').addEventListener('click', openPhoto);
  document.querySelectorAll('[data-weld-photo]').forEach(function (el) {
    el.addEventListener('click', openPhoto);
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openPhoto();
      }
    });
  });
})();
</script>
</body>
</html>
