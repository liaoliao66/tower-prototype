<!DOCTYPE html>
<!-- iPad-INSPECT_COATING v2.1 landscape -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>防腐层质量</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/app-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-basic.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
</head>
<body class="inspect-app-layout ipad-adapt" data-inspect-module-id="coating" data-inspect-module-name="防腐层质量">
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<div id="appNavBar">
  <a href="../../任务/填报主页/ipad_task_inspect_home.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">防腐层质量</span>
  <span style="width:40px;"></span>
</div>

<div id="appEmbedContent" class="inspect-form-stack">

  <div class="inspect-banner" role="status">
    <i class="fa-solid fa-table" aria-hidden="true"></i>
    <span>测区矩阵随塔段展开 · 厚度与外观按模板登记 · 已完成 3/4 测区</span>
  </div>

  <section class="basic-card" aria-labelledby="coatingTableTitle">
    <h3 id="coatingTableTitle" class="basic-card-title">防腐层测区记录表</h3>
    <p class="basic-card-sub">与模板二维表 / 照片类字段同源，当前示例 4 个测区</p>

    <div class="inspect-table-wrap">
      <table class="inspect-data-table">
        <thead>
          <tr>
            <th scope="col">序号</th>
            <th scope="col">测区</th>
            <th scope="col">厚度(μm)</th>
            <th scope="col">外观</th>
            <th scope="col">判定</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td><input type="text" class="form-input table-input" value="塔段1北侧"></td>
            <td><input type="number" class="form-input table-input" value="128"></td>
            <td>
              <select class="form-input table-input">
                <option selected>完好</option>
                <option>起泡</option>
                <option>脱落</option>
              </select>
            </td>
            <td><span class="table-tag pass">合格</span></td>
          </tr>
          <tr>
            <td>2</td>
            <td><input type="text" class="form-input table-input" value="塔段2东侧"></td>
            <td><input type="number" class="form-input table-input" value="115"></td>
            <td>
              <select class="form-input table-input">
                <option selected>完好</option>
                <option>起泡</option>
                <option>脱落</option>
              </select>
            </td>
            <td><span class="table-tag pass">合格</span></td>
          </tr>
          <tr>
            <td>3</td>
            <td><input type="text" class="form-input table-input" value="平台层"></td>
            <td><input type="number" class="form-input table-input" value="92"></td>
            <td>
              <select class="form-input table-input">
                <option>完好</option>
                <option selected>起泡</option>
                <option>脱落</option>
              </select>
            </td>
            <td><span class="table-tag pass">合格</span></td>
          </tr>
          <tr>
            <td>4</td>
            <td><input type="text" class="form-input table-input" value="塔脚法兰区"></td>
            <td><input type="number" class="form-input table-input" value="78"></td>
            <td>
              <select class="form-input table-input">
                <option>完好</option>
                <option>起泡</option>
                <option selected>脱落</option>
              </select>
            </td>
            <td><span class="table-tag fail">不合格</span></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="basic-field">
      <label class="basic-label"><i class="fa-solid fa-camera" aria-hidden="true"></i>测区照片</label>
      <div class="photo-row">
        <div class="photo-thumb-add" role="button" tabindex="0" data-photo>
          <i class="fa-solid fa-camera" aria-hidden="true"></i>
          <span>拍照</span>
        </div>
        <div class="photo-thumb-done" aria-hidden="true">
          <i class="fa-solid fa-image"></i>
          <span>已拍 4</span>
        </div>
      </div>
    </div>

    <div class="basic-field">
      <label class="basic-label" for="coatingRemark"><i class="fa-solid fa-pen" aria-hidden="true"></i>备注</label>
      <textarea id="coatingRemark" class="form-textarea" placeholder="请输入备注">塔脚法兰区局部脱落，建议打磨后补涂。</textarea>
    </div>
  </section>

</div>

<script>
document.querySelectorAll('[data-photo]').forEach(function (el) {
  el.addEventListener('click', function () {
    alert('拍照：记录防腐层测区现场照片（原型演示）。');
  });
});
</script>
</body>
</html>
