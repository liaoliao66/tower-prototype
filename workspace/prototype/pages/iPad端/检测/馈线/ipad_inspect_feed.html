<!DOCTYPE html>
<!-- iPad-INSPECT_FEED v2.0 landscape -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>馈线检测</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../../../../assets/app-frame.css">
<link rel="stylesheet" href="../../../../assets/app-embed.css">
<link rel="stylesheet" href="../../../../assets/app-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-tokens.css">
<link rel="stylesheet" href="../../../../assets/ipad-frame.css">
<link rel="stylesheet" href="../../../../assets/ipad-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-visual.css">
<link rel="stylesheet" href="../../../../assets/ipad-inspect-layout.css">
<link rel="stylesheet" href="../../../../assets/ipad-embed.css">
<script src="../../../../assets/ipad-adapt.js" defer></script>
<script src="../../../../assets/app-embed.js" defer></script>
<script src="../../../../assets/app-inspect-back.js" defer></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #F2F3F5; margin: 0; }
.form-label { font-size:13px; color:#86909C; margin-bottom:6px; display:block; }
.form-input { width:100%; height:44px; border:1px solid #E5E6EB; border-radius:12px; padding:0 14px; font-size:15px; outline:none; box-sizing:border-box; background:#fff; }
</style>
</head>
<body class="inspect-app-layout inspect-embed-pad-116 ipad-adapt">
<!-- Status bar -->
<div id="appStatusBar">
  <span>9:41</span>
  <span><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-full"></i></span>
</div>
<!-- Navigation bar -->
<div id="appNavBar">
  <a href="../../任务/填报主页/ipad_task_inspect_home.html" data-app-inspect-back style="color:#165DFF; text-decoration:none; font-size:14px;"><i class="fa-solid fa-chevron-left"></i> 返回</a>
  <span style="flex:1; text-align:center; font-size:16px; font-weight:600;">馈线检测</span>
  <span style="width:40px;"></span>
</div>

<!-- Content area -->
<div id="appEmbedContent">

  <div style="background:#fff; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
    <div style="font-size:15px; font-weight:600; color:#1D2129; margin-bottom:14px;">馈线检测数据</div>

    <div style="margin-bottom:14px;">
      <label class="form-label">馈线门</label>
      <select class="form-input" style="appearance:auto;">
        <option selected>有</option>
        <option>无</option>
      </select>
    </div>

    <div style="margin-bottom:14px;">
      <label class="form-label">馈线孔数量</label>
      <input type="number" class="form-input" value="4" placeholder="请输入馈线孔数量">
    </div>

    <div style="margin-bottom:14px;">
      <label class="form-label">馈线直径（mm）</label>
      <input type="number" class="form-input" value="50" placeholder="请输入馈线直径">
    </div>

    <div style="margin-bottom:14px;">
      <label class="form-label">馈线数量</label>
      <input type="number" class="form-input" value="6" placeholder="请输入馈线数量">
    </div>

    <div style="margin-bottom:14px;">
      <label class="form-label">馈线窗宽度（mm）</label>
      <input type="number" class="form-input" value="300" placeholder="请输入馈线窗宽度">
    </div>

    <div style="margin-bottom:14px;">
      <label class="form-label">检测结果</label>
      <div style="display:flex; gap:8px;">
        <div style="flex:1; height:40px; border-radius:8px; border:1px solid #00B42A; background:#E8FFEA; color:#00B42A; font-size:13px; text-align:center; line-height:40px; font-weight:600;">合格</div>
        <div style="flex:1; height:40px; border-radius:8px; border:1px solid #E5E6EB; background:#fff; color:#4E5969; font-size:13px; text-align:center; line-height:40px;">不合格</div>
      </div>
    </div>

    <div style="margin-bottom:14px;">
      <label class="form-label">拍照记录</label>
      <div style="display:flex; gap:8px;">
        <div style="width:72px; height:72px; border:2px dashed #E5E6EB; border-radius:8px; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#F7F8FA; cursor:pointer;">
          <i class="fa-solid fa-camera" style="font-size:18px; color:#C9CDD4;"></i>
          <span style="font-size:10px; color:#C9CDD4; margin-top:2px;">拍照</span>
        </div>
      </div>
    </div>

    <div>
      <label class="form-label">备注</label>
      <textarea style="width:100%; height:68px; border:1px solid #E5E6EB; border-radius:12px; padding:10px 14px; font-size:14px; outline:none; box-sizing:border-box; background:#fff; resize:none; font-family:inherit;" placeholder="请输入备注信息"""""></textarea>
    </div>
  </div>

</div>

<!-- Bottom button -->
<div class="ipad-flow-footer" data-app-flow-footer style="position:fixed; bottom:0; left:0; right:0; padding:12px 16px; background:#fff; border-top:1px solid #E5E6EB;">
  <a href="../../检测/回弹/ipad_inspect_rebound.html" style="display:block; width:100%; height:44px; background:#165DFF; color:#fff; border-radius:8px; font-size:16px; font-weight:600; text-decoration:none; text-align:center; line-height:44px; box-sizing:border-box;">下一步</a>
</div>
</body>
</html>
